            buildCategoryTree(categories) {
                const tree = [];
                const categoryMap = {};
                const isRoot = (c) => c.parent === null || c.parent === undefined || c.parent === '';
                
                categories.forEach(cat => {
                    categoryMap[cat.id] = { ...cat, children: [] };
                });
                
                categories.forEach(cat => {
                    if (isRoot(cat)) {
                        tree.push(categoryMap[cat.id]);
                    } else if (categoryMap[cat.parent]) {
                        categoryMap[cat.parent].children.push(categoryMap[cat.id]);
                    } else {
                        tree.push(categoryMap[cat.id]);
                    }
                });
                
                return tree;
            }

            renderCategoryTree(tree, level = 0) {
                return tree.map(category => {
                    const indent = '&nbsp;&nbsp;'.repeat(level * 4);
                    const hasChildren = category.children.length > 0;
                    
                    let html = `
                        <div class="activity-item" style="margin-left: ${level * 20}px;">
                            <div class="activity-icon ${level === 0 ? 'success' : 'info'}">${level === 0 ? '📂' : '📁'}</div>
                            <div class="activity-content">
                                <div class="activity-title">${category.name}</div>
                                <div class="activity-desc">ID: ${category.id} | Cấp: ${level + 1} ${hasChildren ? `| ${category.children.length} danh mục con` : ''}</div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button onclick="app.editCategory('${category.id}')" style="padding: 6px 12px; background: var(--primary-blue); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">Sửa</button>
                                <button onclick="app.deleteCategory('${category.id}')" style="padding: 6px 12px; background: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">Xóa</button>
                            </div>
                        </div>
                    `;
                    
                    if (hasChildren) {
                        html += this.renderCategoryTree(category.children, level + 1);
                    }
                    
                    return html;
                }).join('');
            }

            updateCategory(event, categoryId) {
                event.preventDefault();
                const form = event.target;
                const formData = new FormData(form);
                const categoryName = (formData.get('categoryName') || '').trim();
                if (!categoryName) {
                    this.showNotification('Vui lòng nhập tên danh mục.', 'warning');
                    return;
                }
                const categories = (this.demoData.categories || []).length ? this.demoData.categories : [];

            productMatchesCategoryFilter(p, catFilter) {
                const pc = (p.category || '').trim();
                const cf = (catFilter || '').trim();
                if (!cf) return true;
                const pcLower = pc.toLowerCase();
                const cfLower = cf.toLowerCase();
                const categories = (this.demoData.categories || []).length ? this.demoData.categories : [];
                const isSubCat = cf.includes(' > ');
                if (isSubCat) {
                    const childName = cf.split(' > ').pop()?.trim() || '';
                    const childLower = childName.toLowerCase();
                    return pc === cf || pcLower === cfLower || (childName && (pc === childName || pcLower === childLower));
                }
                if (pc === cf || pcLower === cfLower) return true;
                if (pc.startsWith(cf + ' > ') || pcLower.startsWith(cfLower + ' > ')) return true;
                const parentCat = categories.find(c => this._isCategoryRoot(c) && ((c.name || '').trim() === cf || (c.name || '').toLowerCase() === cfLower));
                if (parentCat) {
                    const childNames = categories.filter(c => c.parent === parentCat.id).map(c => (c.name || '').trim());
                    if (childNames.some(cn => pc === cn || pcLower === (cn || '').toLowerCase())) return true;
                }
                return false;
            }
            getProductsCategoryFilterOptions() {
                const defaultCats = [
                    { id: 'cat1', name: 'Điện thoại', parent: null, level: 0 },
                    { id: 'cat2', name: 'Laptop', parent: null, level: 0 },
                    { id: 'cat3', name: 'Tablet', parent: null, level: 0 },
                    { id: 'cat4', name: 'Phụ kiện', parent: null, level: 0 },
                    { id: 'cat5', name: 'Sản phẩm', parent: null, level: 0 },
                    { id: 'cat6', name: 'Bóng đá', parent: 'cat5', level: 1 },
                    { id: 'cat7', name: 'Pickle Ball', parent: 'cat5', level: 1 }
                ];
                const categories = (this.demoData.categories && this.demoData.categories.length) ? this.demoData.categories : defaultCats;
                const parentCategories = categories.filter(c => this._isCategoryRoot(c) || !this._getCategoryById(c.parent));
                const childCategories = categories.filter(c => !this._isCategoryRoot(c) && this._getCategoryById(c.parent));
                const allNames = categories.map(c => (c.name || '').trim()).filter(Boolean);
                const nameCount = {};
                allNames.forEach(n => { nameCount[n] = (nameCount[n] || 0) + 1; });
                const parentOccurrence = {};
                let opts = '<option value="">Tất cả danh mục</option>';
                parentCategories.forEach(parent => {
                    const children = childCategories.filter(c => c.parent === parent.id);
                    const pName = parent.name || '';
                    parentOccurrence[pName] = (parentOccurrence[pName] || 0) + 1;
                    const pCount = nameCount[pName] || 0;
                    const parentLabel = pCount > 1 && parentOccurrence[pName] > 1 ? `${pName} (${parentOccurrence[pName]})` : pName;
                    const selParent = (this.productsCategoryFilter || '') === pName ? ' selected' : '';
                    opts += `<option value="${pName.replace(/"/g, '&quot;')}"${selParent}>${parentLabel.replace(/</g, '&lt;')}</option>`;
                    children.forEach(child => {
                        const fullName = `${parent.name} > ${child.name}`;
                        const selChild = (this.productsCategoryFilter || '') === fullName ? ' selected' : '';
                        const label = (nameCount[child.name] || 0) > 1 ? fullName : (child.name || '');
                        opts += `<option value="${fullName.replace(/"/g, '&quot;')}"${selChild}>${label.replace(/</g, '&lt;')}</option>`;
                    });
                });
                return opts;
            }
            getCategoryOptions() {
                const defaultCats = [
                    { id: 'cat1', name: 'Điện thoại', parent: null, level: 0 },
                    { id: 'cat2', name: 'Laptop', parent: null, level: 0 },
                    { id: 'cat3', name: 'Tablet', parent: null, level: 0 },
                    { id: 'cat4', name: 'Phụ kiện', parent: null, level: 0 },
                    { id: 'cat5', name: 'Sản phẩm', parent: null, level: 0 },
                    { id: 'cat6', name: 'Bóng đá', parent: 'cat5', level: 1 },
                    { id: 'cat7', name: 'Pickle Ball', parent: 'cat5', level: 1 }
                ];
                const categories = (this.demoData.categories && this.demoData.categories.length) ? this.demoData.categories : defaultCats;
                
                let options = '<option value="">Chọn danh mục</option>';
                const allNames = categories.map(c => (c.name || '').trim()).filter(Boolean);
                const nameCount = {};
                allNames.forEach(n => { nameCount[n] = (nameCount[n] || 0) + 1; });
                const parentNameOccurrence = {};
                
                const parentCategories = categories.filter(c => this._isCategoryRoot(c) || !this._getCategoryById(c.parent));
                const childCategories = categories.filter(c => !this._isCategoryRoot(c) && this._getCategoryById(c.parent));
                
                parentCategories.forEach(parent => {
                    const children = childCategories.filter(c => c.parent === parent.id);
                    const pName = parent.name || '';
                    const pCount = nameCount[pName] || 0;
                    parentNameOccurrence[pName] = (parentNameOccurrence[pName] || 0) + 1;
                    const parentLabel = pCount > 1 && parentNameOccurrence[pName] > 1 ? `${pName} (${parentNameOccurrence[pName]})` : pName;
                    
                    if (children.length > 0) {
                        options += `<optgroup label="${pName.replace(/"/g, '&quot;')}">`;
                        options += `<option value="${pName.replace(/"/g, '&quot;')}">${parentLabel.replace(/</g, '&lt;')}</option>`;
                        children.forEach(child => {
                            const fullVal = `${parent.name} > ${child.name}`;
                            const label = (nameCount[child.name] || 0) > 1 ? fullVal : (child.name || '');
                            options += `<option value="${fullVal.replace(/"/g, '&quot;')}">${label.replace(/</g, '&lt;')}</option>`;
                        });
                        options += `</optgroup>`;
                    } else {
                        options += `<option value="${pName.replace(/"/g, '&quot;')}">${parentLabel.replace(/</g, '&lt;')}</option>`;
                    }
                });
                
                return options;
            }

            // Tạo dữ liệu sản phẩm demo từ tổng tiền đơn hàng
            generateOrderItemsFromTotal(total) {
                const sampleProducts = [
                    { name: 'Máy tính xách tay Dell Inspiron', price: 15000000, sku: 'DELL001' },
                    { name: 'Điện thoại Samsung Galaxy', price: 8000000, sku: 'SAM001' },
                    { name: 'Tai nghe Sony WH-1000XM4', price: 6000000, sku: 'SONY001' },
                    { name: 'Bàn phím cơ Logitech', price: 2500000, sku: 'LOG001' },
                    { name: 'Chuột gaming Razer', price: 1800000, sku: 'RAZ001' },
                    { name: 'Màn hình LG 24 inch', price: 4500000, sku: 'LG001' },
                    { name: 'Ổ cứng SSD Samsung 500GB', price: 2200000, sku: 'SSD001' },
                    { name: 'Camera web Logitech C920', price: 1500000, sku: 'CAM001' },
                    { name: 'Loa Bluetooth JBL', price: 3000000, sku: 'JBL001' },
                    { name: 'Đế tản nhiệt laptop', price: 800000, sku: 'FAN001' }
                ];
                
                const items = [];
                let remainingTotal = total;
                let attempts = 0;
                
                // Tạo 1-4 sản phẩm ngẫu nhiên
                const numItems = Math.min(Math.floor(Math.random() * 3) + 1, 4);
                
                for (let i = 0; i < numItems && remainingTotal > 0 && attempts < 10; i++) {
                    const product = sampleProducts[Math.floor(Math.random() * sampleProducts.length)];
                    
                    // Tính số lượng phù hợp
                    const maxQty = Math.min(Math.floor(remainingTotal / product.price), 5);
                    const quantity = maxQty > 0 ? Math.floor(Math.random() * maxQty) + 1 : 1;
                    
                    // Điều chỉnh giá để phù hợp với số tiền còn lại
                    let itemPrice = product.price;
                    if (i === numItems - 1) {
                        // Sản phẩm cuối cùng: điều chỉnh giá để tổng khớp
                        itemPrice = Math.floor(remainingTotal / quantity);
                    }
                    
                    const itemTotal = quantity * itemPrice;
                    if (itemTotal <= remainingTotal) {
                        items.push({
                            name: product.name,
                            quantity: quantity,
                            price: itemPrice,
                            sku: product.sku,
                            productId: `prod_${product.sku.toLowerCase()}`
                        });
                        remainingTotal -= itemTotal;
                    }
                    attempts++;
                }
                
                // Nếu còn dư tiền, thêm vào sản phẩm cuối
                if (remainingTotal > 0 && items.length > 0) {
                    const lastItem = items[items.length - 1];
                    const extraPerUnit = Math.floor(remainingTotal / lastItem.quantity);
                    lastItem.price += extraPerUnit;
                }
                
                return items;
            }

                const price = parseInt(selectedOption.getAttribute('data-price'), 10) || 0;
                const row = selectElement.closest('.product-row');
                const priceInput = row.querySelector('input[name="price[]"]');
                if (priceInput) priceInput.value = this.formatPrice(price);

            toggleDiscountInput(selectEl) {
                const row = selectEl.closest('.product-row');
                const discountInput = row ? row.querySelector('input[name="discount[]"]') : null;
                if (!discountInput) return;
                const isPercent = selectEl.value === 'percent';
                discountInput.removeAttribute('max');
                if (isPercent) {
                    discountInput.setAttribute('max', '100');
                    const v = parseInt(discountInput.value) || 0;
                    if (v > 100) discountInput.value = 100;
                }
            }

            calculateRowTotal(element) {
                const row = element.closest('.product-row');
                if (!row) return;
                const quantityInput = row.querySelector('input[name="quantity[]"]');
                const priceInput = row.querySelector('input[name="price[]"]');
                const discountInput = row.querySelector('input[name="discount[]"]');
                const discountTypeSelect = row.querySelector('select[name="discountType[]"]');
                const subtotalInput = row.querySelector('input[name="subtotal[]"]');
                if (!quantityInput || !priceInput || !discountInput || !subtotalInput) return;
                const quantity = parseInt(quantityInput.value) || 0;
                const price = this.parsePrice(priceInput.value);
                const discountVal = this.parsePrice(discountInput.value);
                const isVnd = (!discountTypeSelect || discountTypeSelect.value === 'vnd');
                const beforeDiscount = quantity * price;
                const discountAmount = isVnd ? Math.min(discountVal, beforeDiscount) : (beforeDiscount * discountVal / 100);
                const subtotal = Math.max(0, beforeDiscount - discountAmount);
                if (beforeDiscount > 0) {
                    if (discountAmount > 0) {
                        subtotalInput.value = isVnd
                            ? `${subtotal.toLocaleString('vi-VN')} VNĐ (-${discountVal.toLocaleString('vi-VN')} đ)`
                            : `${subtotal.toLocaleString('vi-VN')} VNĐ (-${discountVal}%)`;
                    } else {
                        subtotalInput.value = `${subtotal.toLocaleString('vi-VN')} VNĐ`;

                    subtotalInput.value = '';

                    const typeSelect = row.querySelector('select[name="discountType[]"]');
                    const isVnd = (!typeSelect || typeSelect.value === 'vnd');
                    const beforeDiscount = quantity * price;
                    const discountAmount = isVnd ? Math.min(discountVal, beforeDiscount) : (beforeDiscount * discountVal / 100);
                    total += Math.max(0, beforeDiscount - discountAmount);
                });
                const totalElement = document.getElementById('order-total');
                if (totalElement) totalElement.textContent = total.toLocaleString('vi-VN') + ' VNĐ';

                if (priceInput) {

                    // Call the appropriate calculation function
                    if (typeof this.calculateTotal === 'function') {
                        this.calculateTotal();

                    if (typeof this.calculateRowTotal === 'function') {
                        this.calculateRowTotal(priceInput);
                    }
                    if (typeof this.calculateOrderTotal === 'function') {

                    }

                this.closeAllDropdowns();

                if (productList) {

            filterDropdownItems(searchInput, type) {
                const searchTerm = searchInput.value.toLowerCase();
                const dropdown = searchInput.closest('.custom-dropdown');
                const options = dropdown.querySelectorAll('.dropdown-option');
                
                options.forEach(option => {

                    if (text.includes(searchTerm)) {

            createOrder(event) {
                event.preventDefault();
                const form = event.target;
                const formData = new FormData(form);
                
                const customerId = formData.get('customer') || 'KH_LE';
                let customer = (this.demoData.customers || []).find(c => c.id === customerId);
                if (!customer || customerId === 'KH_LE') {
                    customer = { id: 'KH_LE', name: 'Khách lẻ', type: 'ca-nhan', phone: '', email: '', address: '', debt: 0 };
                }

                const products = [];
                const productIds = formData.getAll('product[]');
                const quantities = formData.getAll('quantity[]');
                const prices = formData.getAll('price[]');
                const discountTypes = formData.getAll('discountType[]');
                const discounts = formData.getAll('discount[]');
                
                const stockWarnings = [];
                const outOfStockItems = [];
                
                for (let i = 0; i < productIds.length; i++) {
                    if (productIds[i] && productIds[i].trim() !== '' && quantities[i] && prices[i]) {
                        const product = this.demoData.products.find(p => p.id === productIds[i]);
                        if (product) {
                            const requestedQty = parseInt(quantities[i]) || 1;
                            const stock = (product.hasImei && product.imeis) ? (product.stock != null ? product.stock : product.imeis.length) : (product.stock || 0);
                            if (stock < requestedQty) {
                                outOfStockItems.push(`${product.name}: cần ${requestedQty}, chỉ còn ${stock}`);
                                continue;
                            }
                            const discountType = (discountTypes[i] || 'vnd').toLowerCase();
                            const discountVal = this.parsePrice(discounts[i]);
                            products.push({
                                id: productIds[i],
                                name: product.name,
                                quantity: requestedQty,
                                price: this.parsePrice(prices[i]),
                                discountType: discountType === 'percent' ? 'percent' : 'vnd',
                                discount: discountVal
                            });
                        }
                    }
                }
                
                // Thông báo lỗi nếu có sản phẩm hết hàng
                if (outOfStockItems.length > 0) {
                    this.showNotification(`Không đủ hàng: ${outOfStockItems.join(', ')}`, 'error');
                    return;
                }

                if (products.length === 0) {
                    this.showNotification('Vui lòng chọn ít nhất một sản phẩm', 'error');
                    return;
                }

                const total = products.reduce((sum, product) => {
                    const beforeDiscount = product.quantity * product.price;
                    const isVnd = (product.discountType || 'vnd') === 'vnd';
                    const discountAmount = isVnd ? Math.min(product.discount || 0, beforeDiscount) : (beforeDiscount * (product.discount || 0) / 100);
                    return sum + Math.max(0, beforeDiscount - discountAmount);
                }, 0);
                // Sử dụng ngày giờ Việt Nam (UTC+7) cho đơn hàng mới  
                const vietnamTime = this.getVietnamTime();
                
                // Get payment status to determine order status
                const paymentStatus = formData.get('paymentStatus') || 'Đã thanh toán';
                let amountPaid = this.parsePrice(formData.get('amountPaid'));
                if (amountPaid > total) amountPaid = total;
                if (paymentStatus === 'Đã thanh toán' && amountPaid === 0) amountPaid = total;
                const orderDebt = total - amountPaid;
                const orderCount = this.demoData.orders.length;
                const newOrder = {
                    id: 'DH' + String(orderCount + 1).padStart(4, '0'),
                    customerId: customer.id,
                    customerName: customer.name,
                    date: vietnamTime.toISOString().split('T')[0],
                    time: vietnamTime.toTimeString().split(' ')[0].substring(0, 5),
                    products: products,
                    notes: formData.get('orderNotes') || '',
                    total: total,
                    amountPaid: amountPaid,
                    status: paymentStatus === 'Đã thanh toán' ? 'Hoàn thành' : 'Đang xử lý',
                    paymentMethod: formData.get('paymentMethod'),
                    paymentStatus: paymentStatus,
                    stockDeducted: true
                };

                // TRỪ TỒN KHO TỰ ĐỘNG (hỗ trợ cả IMEI và sản phẩm thường)
                const lowStockAlerts = [];
                products.forEach(ordProduct => {
                    const prod = this.demoData.products.find(p => p.id === ordProduct.id);
                    if (!prod) return;
                    const qty = ordProduct.quantity || 1;
                    if (prod.hasImei && prod.imeis && Array.isArray(prod.imeis)) {
                        const toSell = Math.min(qty, prod.imeis.length);
                        const soldImeis = prod.imeis.splice(0, toSell);
                        ordProduct.soldImeis = soldImeis;
                    }
                    prod.stock = Math.max(0, (prod.stock || (prod.hasImei && prod.imeis ? prod.imeis.length : 0)) - qty);
                    ordProduct.productId = ordProduct.id;
                    const minS = (prod.hasImei && prod.imeis) ? 0 : (prod.minStock ?? 10);
                    const stockS = (prod.stock ?? (prod.hasImei && prod.imeis ? prod.imeis.length : 0));
                    if (minS > 0 && stockS <= minS) {
                        lowStockAlerts.push({ name: prod.name, current: stockS, minimum: minS });
                    }
                });

                // THÊM ĐƠN HÀNG MỚI VÀO ĐẦU DANH SÁCH thay vì cuối
                this.demoData.orders.unshift(newOrder);
                console.log('✅ Đơn hàng mới được thêm vào ĐẦU danh sách:', newOrder.id);
                
                // Công nợ = phần chưa trả (tổng − khách thanh toán) - bỏ qua Khách lẻ (không lưu trong danh sách)
                if (orderDebt > 0 && customerId !== 'KH_LE') {
                    const cust = (this.demoData.customers || []).find(c => c.id === customerId);
                    if (cust) {
                        cust.debt = (cust.debt || 0) + orderDebt;
                        console.log(`Cập nhật công nợ khách hàng ${cust.name}: +${orderDebt.toLocaleString('vi-VN')} VNĐ (đã trả ${amountPaid.toLocaleString('vi-VN')} / ${total.toLocaleString('vi-VN')})`);
                    }
                }
                
                this.saveToLocalStorage();
                
                // Ghi log hoạt động
                this.addActivityLog('success', '📋', `Tạo đơn hàng ${newOrder.id}`, 
                    `Khách hàng: ${customer.name} - Giá trị: ${total.toLocaleString('vi-VN')} VNĐ - ${products.length} sản phẩm - ${paymentStatus}`, 'order');
                
                // Ghi log hoạt động trừ tồn kho
                products.forEach(ordProduct => {
                    this.addActivityLog('info', '📦', `Trừ tồn kho`, 
                        `Sản phẩm: ${ordProduct.name} - Số lượng: ${ordProduct.quantity || 1}`, 'inventory');
                });
                
                // Hiển thị thông báo thành công
                let successMessage = `Đã tạo đơn hàng ${newOrder.id}`;
                
                // Hiển thị cảnh báo tồn kho thấp nếu có
                if (lowStockAlerts.length > 0) {
                    const alertMessages = lowStockAlerts.map(alert => 
                        `${alert.name}: còn ${alert.current}/${alert.minimum}`
                    ).join(', ');
                    
                    setTimeout(() => {
                        this.showNotification(`⚠️ Cảnh báo tồn kho thấp: ${alertMessages}`, 'warning');
                    }, 1000);
                }
                
                this.showNotification(successMessage, 'success');
                this.loadPage('orders');
                const modal = form.closest("div[style*=\"fixed\"]"); if(modal) modal.remove();
            }

            updateProductPriceInEdit(selectElement, rowIndex) {
                const selectedOption = selectElement.options[selectElement.selectedIndex];
                const price = selectedOption.getAttribute('data-price');
                const priceInput = document.querySelector(`input[name="price_${rowIndex}"]`);
                if (priceInput && price) {
                    priceInput.value = this.formatPrice(parseInt(price, 10) || 0);
                }
            }

            updateOrderComplete(event, index) {
                event.preventDefault();
                const form = event.target;
                const formData = new FormData(form);
                
                const order = this.demoData.orders[index];
                const oldCustomer = this.demoData.customers.find(c => c.id === order.customerId);
                const newCustomer = this.demoData.customers.find(c => c.id === formData.get('customerId'));
                
                if (!oldCustomer || !newCustomer) {
                    this.showNotification('Không tìm thấy thông tin khách hàng', 'error');
                    return;
                }
                
                const oldOrderDebt = Math.max(0, (order.total || 0) - (order.amountPaid != null ? order.amountPaid : (order.paymentStatus === 'Đã thanh toán' ? order.total : 0)));
                const productsData = this.demoData.products || [];
                const oldByPid = {};
                (order.products || []).forEach(op => {
                    const pid = op.id || op.productId;
                    if (!pid) return;
                    if (!oldByPid[pid]) oldByPid[pid] = { qty: 0, soldImeis: [] };
                    oldByPid[pid].qty += (op.quantity || 1);
                    if (op.soldImeis && Array.isArray(op.soldImeis)) {
                        oldByPid[pid].soldImeis = (oldByPid[pid].soldImeis || []).concat(op.soldImeis);
                    }
                });
                
                // Lấy thông tin sản phẩm mới
                const products = [];
                const productElements = form.querySelectorAll('[data-product-row]');
                
                productElements.forEach((row, i) => {
                    const productId = formData.get(`productId_${i}`);
                    const price = this.parsePrice(formData.get(`price_${i}`));
                    const quantity = parseInt(formData.get(`quantity_${i}`)) || 1;
                    const discountType = (formData.get(`discountType_${i}`) || 'vnd').toLowerCase();
                    const discountVal = this.parsePrice(formData.get(`discount_${i}`));
                    if (productId) {
                        const product = this.demoData.products.find(p => p.id === productId);
                        if (product) {
                            products.push({
                                id: productId,
                                name: product.name,
                                quantity: quantity,
                                price: price,
                                discountType: discountType === 'percent' ? 'percent' : 'vnd',
                                discount: discountVal
                            });
                        }
                    }
                });
                if (products.length === 0) {
                    this.showNotification('Vui lòng chọn ít nhất một sản phẩm', 'error');
                    return;
                }
                const newTotal = products.reduce((sum, product) => {
                    const beforeDiscount = product.quantity * product.price;
                    const isVnd = (product.discountType || 'vnd') === 'vnd';
                    const discountAmount = isVnd ? Math.min(product.discount || 0, beforeDiscount) : (beforeDiscount * (product.discount || 0) / 100);
                    return sum + Math.max(0, beforeDiscount - discountAmount);
                }, 0);
                
                // Cập nhật đơn hàng
                const newPaymentStatus = formData.get('paymentStatus');
                const newStatus = formData.get('status');
                
                let newAmountPaid = this.parsePrice(formData.get('amountPaid'));
                if (isNaN(newAmountPaid) || newAmountPaid < 0) newAmountPaid = 0;
                if (newAmountPaid > newTotal) newAmountPaid = newTotal;
                if (newPaymentStatus === 'Đã thanh toán' && newAmountPaid === 0) newAmountPaid = newTotal;
                const newOrderDebt = newTotal - newAmountPaid;
                
                const newByPid = {};
                products.forEach(p => {
                    const pid = p.id || p.productId;
                    if (!newByPid[pid]) newByPid[pid] = 0;
                    newByPid[pid] += (p.quantity || 1);
                });
                for (const pid of Object.keys(newByPid)) {
                    const prod = productsData.find(p => p.id === pid);
                    if (!prod) continue;
                    const needQty = newByPid[pid];
                    const oldInfo = oldByPid[pid];
                    const available = prod.hasImei && prod.imeis
                        ? (prod.imeis.length + (oldInfo && oldInfo.soldImeis ? oldInfo.soldImeis.length : 0))
                        : (prod.stock || 0) + (oldInfo ? oldInfo.qty : 0);
                    if (available < needQty) {
                        this.showNotification(`${prod.name}: cần ${needQty}, khả dụng ${available} (sau khi hoàn trả từ đơn cũ)`, 'error');
                        return;
                    }
                }
                
                (order.products || []).forEach(op => {
                    const prod = productsData.find(p => p.id === (op.id || op.productId));
                    if (!prod || !(op.quantity > 0)) return;
                    if (op.soldImeis && Array.isArray(op.soldImeis)) {
                        prod.imeis = prod.imeis || [];
                        op.soldImeis.forEach(imei => prod.imeis.push(imei));
                    } else {
                        prod.stock = (prod.stock || 0) + op.quantity;
                    }
                });

                for (const pr of products) {
                    const prod = productsData.find(p => p.id === (pr.id || pr.productId));
                    if (!prod) continue;
                    const qty = pr.quantity || 1;
                    if (prod.hasImei && prod.imeis && Array.isArray(prod.imeis)) {
                        const toSell = Math.min(qty, prod.imeis.length);
                        const soldImeis = prod.imeis.splice(0, toSell);
                        pr.soldImeis = soldImeis;
                    }
                    prod.stock = Math.max(0, (prod.stock || (prod.hasImei && prod.imeis ? prod.imeis.length : 0)) - qty);
                    pr.productId = pr.id || pr.productId;
                }
                
                oldCustomer.debt -= oldOrderDebt;
                if (oldCustomer.debt < 0) oldCustomer.debt = 0;
                order.customerId = newCustomer.id;
                order.customerName = newCustomer.name;
                order.products = products;
                order.total = newTotal;
                order.amountPaid = newAmountPaid;
                order.paymentStatus = newPaymentStatus;
                order.status = newStatus;
                order.paymentMethod = formData.get('paymentMethod');
                order.notes = formData.get('notes') || '';
                order.stockDeducted = true;
                if (newOrderDebt > 0) {
                    newCustomer.debt += newOrderDebt;
                }
                
                this.saveToLocalStorage();
                this.showNotification(`Đã cập nhật đơn hàng ${order.id}`, 'success');
                this.loadPage('orders');
                const modal = form.closest("div[style*=\"fixed\"]"); if(modal) modal.remove();
            }

            updateOrder(event, index) {
                event.preventDefault();
                const form = event.target;
                const formData = new FormData(form);
                
                this.demoData.orders[index].status = formData.get('status');
                this.demoData.orders[index].paymentMethod = formData.get('paymentMethod');
                
                this.saveToLocalStorage();
                this.showNotification(`Đã cập nhật đơn hàng ${this.demoData.orders[index].id}`, 'success');

            deleteOrder(index, redirectTo) {
                const order = this.demoData.orders[index];
                if (!order) return;
                if (confirm(`Bạn có chắc muốn xóa đơn hàng ${order.id}?`)) {
                    const products = this.demoData.products || [];
                    (order.products || []).forEach(op => {
                        const prod = products.find(p => p.id === (op.id || op.productId));
                        if (!prod || !(op.quantity > 0)) return;
                        if (op.soldImeis && Array.isArray(op.soldImeis)) {
                            prod.imeis = prod.imeis || [];
                            op.soldImeis.forEach(imei => prod.imeis.push(imei));
                        } else {
                            prod.stock = (prod.stock || 0) + op.quantity;
                        }
                    });
                    const customer = this.demoData.customers.find(c => c.id === order.customerId || c.name === order.customerName);
                    const orderDebt = Math.max(0, (order.total || 0) - (order.amountPaid != null ? order.amountPaid : (order.paymentStatus === 'Đã thanh toán' ? order.total : 0)));
                    if (customer && orderDebt > 0) {
                        customer.debt -= orderDebt;
                        if (customer.debt < 0) customer.debt = 0;
                    }
                    this.demoData.orders.splice(index, 1);
                    this.saveToLocalStorage();
                    this.showNotification(`Đã xóa đơn hàng ${order.id} và hoàn trả tồn kho`, 'success');
                    this.loadPage(redirectTo || 'orders');
                }
            }

            deleteOrderFromSales(index) {
                this.deleteOrder(index, 'sales');
            }

            confirmResetSalesData() {
                const ordersCount = (this.demoData.orders || []).length;
                const salesCount = (this.demoData.sales || []).length;
                const totalItems = ordersCount + salesCount;
                if (totalItems === 0) {
                    this.showNotification('Không có dữ liệu để reset', 'info');
                    return;
                }
                const msg = `Bạn có chắc muốn reset Tổng doanh thu và Đơn hoàn thành về 0?\n\n` +
                    `Toàn bộ ${totalItems} đơn hàng/dữ liệu demo sẽ bị xóa. ` +
                    `Doanh thu từ các ngày demo sẽ không được tính nữa.\n\nKhông thể hoàn tác. Tiếp tục?`;
                if (confirm(msg)) {
                    this.resetSalesData();
                }
            }

            resetSalesData() {
                (this.demoData.debtPayments || []).splice(0);
                // Hoàn trả số lượng đã bán về tồn kho trước khi xóa đơn
                const products = this.demoData.products || [];
                (this.demoData.orders || []).forEach(order => {
                    (order.products || []).forEach(op => {
                        const p = products.find(pr => pr.id === (op.id || op.productId));
                        if (!p || !(op.quantity > 0)) return;
                        if (op.soldImeis && Array.isArray(op.soldImeis)) {
                            p.imeis = p.imeis || [];
                            op.soldImeis.forEach(imei => p.imeis.push(imei));
                        } else {
                            p.stock = (p.stock || 0) + op.quantity;
                        }
                    });
                });
                (this.demoData.sales || []).forEach(sale => {
                    (sale.itemDetails || []).forEach(item => {
                        const p = products.find(pr => pr.id === item.productId);
                        if (p && item.quantity) {
                            p.stock = (p.stock || 0) + item.quantity;
                        }
                    });
                });
                this.demoData.orders = [];
                this.demoData.sales = [];
                (this.demoData.customers || []).forEach(c => { c.debt = 0; });
                this.saveToLocalStorage();
                this.showNotification('Đã reset doanh thu, đơn hàng và hoàn trả tồn kho sản phẩm', 'success');
                this.loadPage('settings');
            }

            confirmTogglePaymentStatus(index, newPaymentStatus, newStatus) {
                const order = this.demoData.orders[index];
                const customer = this.demoData.customers.find(c => c.id === order.customerId);
                const oldPaymentStatus = order.paymentStatus;
                const currentPaid = order.amountPaid != null ? order.amountPaid : (order.paymentStatus === 'Đã thanh toán' ? order.total : 0);
                const orderDebt = Math.max(0, (order.total || 0) - currentPaid);
                order.paymentStatus = newPaymentStatus;
                order.status = newStatus;
                if (oldPaymentStatus === 'Đã thanh toán' && newPaymentStatus === 'Công nợ') {
                    order.amountPaid = 0;
                    customer.debt += order.total;
                } else if (oldPaymentStatus === 'Công nợ' && newPaymentStatus === 'Đã thanh toán') {
                    order.amountPaid = order.total;
                    customer.debt -= orderDebt;
                    if (customer.debt < 0) customer.debt = 0;
                }
                this.saveToLocalStorage();
                this.refreshAllCustomerDisplays();
                
                // Ghi log hoạt động
                const statusChange = `${oldPaymentStatus} → ${newPaymentStatus}`;
                this.addActivityLog('success', '💳', `Cập nhật thanh toán ${order.id}`, 
                    `Khách hàng: ${customer.name} - Thay đổi: ${statusChange} - Giá trị: ${order.total.toLocaleString('vi-VN')} VNĐ`, 'payment');
                
                this.showNotification(`✅ Đã cập nhật: ${order.id} - ${newPaymentStatus}. Nợ ${customer.name}: ${customer.debt.toLocaleString('vi-VN')} VNĐ`, 'success');
                
                // Cập nhật giao diện ngay lập tức thay vì tải lại trang
                this.updateOrderRowDisplay(index);
            }

                // Tìm dòng đơn hàng trong bảng hiện tại
                const orderRows = document.querySelectorAll('tbody tr[data-order-index]');

            filterOrdersByPeriod(period) {
                const now = this.getVietnamTime();
                const today = now.toISOString().split('T')[0];
                
                // Tính toán ngày bắt đầu của tuần (thứ 2)
                const startOfWeek = new Date(now);
                const day = startOfWeek.getDay();
                const diff = startOfWeek.getDate() - day + (day === 0 ? -6 : 1); // Điều chỉnh để thứ 2 là ngày đầu tuần
                startOfWeek.setDate(diff);
                const weekStart = startOfWeek.toISOString().split('T')[0];
                
                // Lọc đơn hàng theo thời gian
                let filteredOrders = [];
                if (period === 'today') {
                    filteredOrders = this.demoData.orders.filter(order => order.date === today);
                } else if (period === 'week') {
                    filteredOrders = this.demoData.orders.filter(order => order.date >= weekStart);
                } else {
                    filteredOrders = this.demoData.orders;
                }
                
                // Ẩn tất cả các dòng trong bảng
                const rows = document.querySelectorAll('#orders-table tbody tr');
                rows.forEach(row => row.style.display = 'none');
                
                // Hiển thị chỉ những đơn hàng được lọc
                filteredOrders.forEach((order, index) => {
                    const originalIndex = this.demoData.orders.findIndex(o => o.id === order.id);
                    const row = document.querySelector(`#orders-table tbody tr:nth-child(${originalIndex + 1})`);
                    if (row) {
                        row.style.display = '';
                    }
                });
                
                // Cập nhật tiêu đề và thông báo
                const periodText = period === 'today' ? 'hôm nay' : period === 'week' ? 'tuần này' : 'tất cả';
                const headerElement = document.querySelector('#orders-table').previousElementSibling;
                if (headerElement && headerElement.tagName === 'H3') {
                    headerElement.innerHTML = `<span>📋</span> Đơn hàng ${periodText} (${filteredOrders.length})`;
                }
                
                this.showNotification(`Hiển thị ${filteredOrders.length} đơn hàng ${periodText}`, 'success');
            }

            searchOrders(searchTerm) {
                const rows = document.querySelectorAll('#orders-table tbody tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    const isVisible = text.includes(searchTerm.toLowerCase());
                    row.style.display = isVisible ? '' : 'none';
                });
            }

                    this.demoData.orders.forEach(order => {
                        order.products.forEach((product, productIndex) => {

                            csvContent += row + "\n";
                        });
                    });
                    
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `don_hang_${this.getVietnamTime().toISOString().split('T')[0]}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    this.showNotification('Đã tải xuống báo cáo đơn hàng chi tiết', 'success');
                }
            }

            showTrendAnalysis() {
                // Tính toán dữ liệu phân tích
                const orderRevenue = this.demoData.orders.reduce((sum, order) => sum + (order.total || 0), 0);
                const repairRevenue = (this.demoData.repairs || []).reduce((s, r) => {
                    if ((r.status || '') !== 'Đã trả') return s;
                    return s + (Number(r.repairCost) || 0);
                }, 0);
                const totalRevenue = orderRevenue + repairRevenue;
                const totalTransactions = this.demoData.orders.length + (this.demoData.repairs || []).length;
                const avgOrderValue = totalTransactions > 0 ? totalRevenue / totalTransactions : 0;
                const totalDebt = this.demoData.customers.reduce((sum, c) => sum + c.debt, 0);

            // Customer Search and Quick Add Functions
            filterCustomers(searchTerm) {
                const customerSelect = document.getElementById('customer-select');
                if (!customerSelect) return;

                const options = customerSelect.querySelectorAll('option');
                let hasVisibleOptions = false;

                options.forEach((option, index) => {
                    if (index === 0) { // Keep the placeholder option
                        option.style.display = '';
                        return;
                    }

                    const text = option.textContent.toLowerCase();
                    const matches = text.includes(searchTerm.toLowerCase());
                    option.style.display = matches ? '' : 'none';
                    
                    if (matches) hasVisibleOptions = true;
                });

                // If no matches, show a "not found" option temporarily
                if (!hasVisibleOptions && searchTerm) {
                    const notFoundOption = customerSelect.querySelector('.not-found-option');
                    if (notFoundOption) {
                        notFoundOption.remove();
                    }
                    
                    const newOption = document.createElement('option');
                    newOption.value = '';
                    newOption.textContent = '❌ Không tìm thấy khách hàng';
                    newOption.className = 'not-found-option';
                    newOption.disabled = true;
                    customerSelect.appendChild(newOption);
                } else {
                    // Remove not found option if exists
                    const notFoundOption = customerSelect.querySelector('.not-found-option');
                    if (notFoundOption) {
                        notFoundOption.remove();
                    }
                }
            }

            quickAddCustomer(event) {
                event.preventDefault();
                const formData = new FormData(event.target);
                
                const maxNum = Math.max(0, ...(this.demoData.customers || []).map(c => {
                    const m = (c.id || '').match(/^KH(\d+)$/);
                    return m ? parseInt(m[1], 10) : 0;
                }));
                const newCustomer = {
                    id: 'KH' + String(maxNum + 1).padStart(3, '0'),
                    name: formData.get('customerName'),
                    type: formData.get('customerType') || 'ca-nhan',
                    companyName: formData.get('companyName') || '',
                    department: formData.get('department') || '',
                    phone: formData.get('customerPhone') || '',
                    email: formData.get('customerEmail') || '',
                    address: formData.get('customerAddress') || '',
                    taxCode: formData.get('taxCode') || '',
                    notes: formData.get('customerNotes') || '',
                    debt: 0,
                    totalOrders: 0
                };

                // Add to demo data
                this.demoData.customers.push(newCustomer);
                this.saveToLocalStorage();

                // Update customer select in the current form (Create Order)
                const customerSelect = document.getElementById('customer-select');
                if (customerSelect) {

            // Toggle hiển thị/ẩn bộ lọc
            toggleFilterSection() {

                if (content.style.display === 'none') {
                    content.style.display = 'block';

                    this.filterState.isCollapsed = false;
                } else {

                }
            }

            // Áp dụng lựa chọn nhanh - chọn xong áp dụng ngay không cần nhấn nút
            applyQuickFilter(value) {
                const fromDateInput = document.getElementById('filter-from-date');
                const toDateInput = document.getElementById('filter-to-date');
                const today = this.getVietnamTime();
                let fromDate, toDate;

                switch(value) {
                    case 'today':
                        fromDate = toDate = new Date(today.getTime());
                        break;
                    case 'yesterday':
                        fromDate = toDate = new Date(today.getTime() - 24 * 60 * 60 * 1000);
                        break;
                    case 'this-week':
                        const startOfWeek = new Date(today);
                        startOfWeek.setDate(today.getDate() - today.getDay() + 1); // Thứ 2
                        fromDate = startOfWeek;
                        toDate = today;
                        break;
                    case 'last-week':
                        const startOfLastWeek = new Date(today);
                        startOfLastWeek.setDate(today.getDate() - today.getDay() - 6);
                        const endOfLastWeek = new Date(today);
                        endOfLastWeek.setDate(today.getDate() - today.getDay());
                        fromDate = startOfLastWeek;
                        toDate = endOfLastWeek;
                        break;
                    case 'this-month':
                        fromDate = new Date(today.getFullYear(), today.getMonth(), 1);
                        toDate = today;
                        break;
                    case 'last-month':
                        fromDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                        toDate = new Date(today.getFullYear(), today.getMonth(), 0);
                        break;
                    case 'last-30-days':
                        fromDate = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
                        toDate = today;
                        break;
                    case 'last-90-days':
                        fromDate = new Date(today.getTime() - 90 * 24 * 60 * 60 * 1000);
                        toDate = today;
                        break;
                    case 'this-year':
                        fromDate = new Date(today.getFullYear(), 0, 1);
                        toDate = today;
                        break;
                    case 'last-year':
                        fromDate = new Date(today.getFullYear() - 1, 0, 1);
                        toDate = new Date(today.getFullYear() - 1, 11, 31);
                        break;
                    default:
                        return;
                }

                if (fromDate && toDate) {
                    fromDateInput.value = fromDate.toISOString ? fromDate.toISOString().split('T')[0] : fromDate;
                    toDateInput.value = toDate.toISOString ? toDate.toISOString().split('T')[0] : toDate;
                    this.applyDateFilter();
                }
            }

            // Áp dụng bộ lọc ngày tháng
            applyDateFilter() {
                const fromDate = document.getElementById('filter-from-date').value;
                const toDate = document.getElementById('filter-to-date').value;
                
                if (!fromDate || !toDate) {
                    this.showNotification('Vui lòng chọn đầy đủ ngày bắt đầu và kết thúc', 'warning');
                    return;
                }

                if (new Date(fromDate) > new Date(toDate)) {
                    this.showNotification('Ngày bắt đầu không thể sau ngày kết thúc', 'error');
                    return;
                }

                // Lưu trạng thái filter
                this.filterState.fromDate = fromDate;
                this.filterState.toDate = toDate;

                // Cập nhật thông tin hiển thị
                const filterInfo = document.getElementById('filter-info');
                if (filterInfo) {
                    filterInfo.innerHTML = `Hiển thị dữ liệu từ <strong>${this.formatDateForDisplay(fromDate)}</strong> đến <strong>${this.formatDateForDisplay(toDate)}</strong>`;
                }

                // Lọc và cập nhật dữ liệu báo cáo
                this.filterReportsData(fromDate, toDate);
                this.showNotification(`Đã áp dụng bộ lọc từ ${this.formatDateForDisplay(fromDate)} đến ${this.formatDateForDisplay(toDate)}`, 'success');
            }

            // Reset bộ lọc về mặc định và load lại trang báo cáo
            resetDateFilter() {
                this.filterState = {
                    fromDate: this.getDefaultFromDate(),
                    toDate: this.getDefaultToDate(),
                    isCollapsed: false
                };
                this.showNotification('Đã đặt lại bộ lọc về mặc định', 'info');
                this.loadPage('reports');
            }

            // Lọc dữ liệu báo cáo theo khoảng thời gian
            filterReportsData(fromDate, toDate) {
                const startDate = new Date(fromDate);
                const endDate = new Date(toDate);
                endDate.setHours(23, 59, 59, 999); // Include toàn bộ ngày cuối

                // Lọc đơn hàng theo khoảng thời gian
                const filteredOrders = this.demoData.orders.filter(order => {
                    const orderDate = new Date(order.date);
                    return orderDate >= startDate && orderDate <= endDate;
                });

                const filteredRepairs = (this.demoData.repairs || []).filter(rep => {
                    const repDate = rep.date ? new Date(rep.date) : null;
                    if (!repDate || isNaN(repDate.getTime())) return false;
                    return repDate >= startDate && repDate <= endDate;
                });
                const repairRevenue = filteredRepairs.reduce((s, r) => {
                    if ((r.status || '') !== 'Đã trả') return s;
                    return s + (Number(r.repairCost) || 0);
                }, 0);

                // Tính toán lại các số liệu thống kê (Doanh thu = đơn hàng + sửa chữa)
                const orderRevenue = filteredOrders.reduce((sum, order) => sum + (order.total || 0), 0);
                const totalRevenue = orderRevenue + repairRevenue;

                const orderProfit = filteredOrders.reduce((sum, order) => sum + this.calcOrderProfit(order), 0);
                const repairProfit = filteredRepairs.reduce((s, r) => s + this.calcRepairProfit(r), 0);
                const totalProfit = orderProfit + repairProfit;
                const profitFromDebt = filteredOrders.filter(o => o.paymentStatus === 'Công nợ').reduce((sum, o) => sum + this.calcOrderProfit(o), 0);

                const totalDebt = filteredOrders.reduce((sum, order) => {
                    return order.paymentStatus === 'Công nợ' ? sum + order.total : sum;
                }, 0);

                // Cập nhật display thống kê
                this.updateFilteredStats(totalRevenue, totalProfit, totalDebt, filteredOrders.length, profitFromDebt, filteredRepairs.length);

                // Cập nhật danh sách đơn hàng hiển thị
                this.updateOrdersList(filteredOrders);

                // Cập nhật danh sách phiếu sửa chữa
                this.updateRepairsListInReport(filteredRepairs);
            }

            updateRepairsListInReport(filteredRepairs) {
                const section = document.getElementById('reports-repairs-section');
                const container = document.getElementById('reports-repairs-list');
                if (!section || !container) return;
                if (filteredRepairs.length === 0) {
                    section.style.display = 'none';
                    return;
                }
                section.style.display = '';
                const header = section ? section.querySelector('h3') : null;
                if (header) header.innerHTML = `<span>🔧</span> Phiếu sửa chữa trong khoảng chọn (${filteredRepairs.length})`;
                container.innerHTML = filteredRepairs.map(r => {
                    const rev = (r.status || '') === 'Đã trả' ? (Number(r.repairCost) || 0) : 0;
                    const payStatus = (r.status || '') === 'Đã trả' ? (r.paymentStatus || ((r.amountPaid >= (Number(r.repairCost) || 0)) ? 'Đã thanh toán' : 'Công nợ')) : '-';
                    return `<tr style="border-bottom: 1px solid #e5e7eb;">
                        <td style="padding: 12px;">${(r.id || '').replace(/</g, '&lt;')}</td>
                        <td style="padding: 12px;">${(r.customerName || '-').replace(/</g, '&lt;')}</td>
                        <td style="padding: 12px;">${(r.date || '-')} ${(r.time || '')}</td>
                        <td style="padding: 12px; text-align: right; font-weight: 600;">${rev.toLocaleString('vi-VN')} đ</td>
                        <td style="padding: 12px;">${payStatus.replace(/</g, '&lt;')}</td>
                        <td style="padding: 12px;">${(r.status || '-').replace(/</g, '&lt;')}</td>
                    </tr>`;
                }).join('');
            }

            // Cập nhật hiển thị thống kê sau khi lọc
            updateFilteredStats(revenue, profit, debt, orderCount, profitFromDebt = 0, repairCount = 0) {
                // Cập nhật các card thống kê
                const revenueCard = document.querySelector('.stat-card.revenue .stat-value');
                const profitCard = document.querySelector('.stat-card.info .stat-value');
                
                if (revenueCard) {
                    revenueCard.textContent = revenue.toLocaleString('vi-VN') + ' VNĐ';
                }
                if (profitCard) {
                    profitCard.textContent = profit.toLocaleString('vi-VN') + ' VNĐ';
                }

                const revenueStatChange = document.querySelector('.stat-card.revenue .stat-change');
                if (revenueStatChange) {
                    revenueStatChange.textContent = orderCount + ' đơn hàng' + (repairCount > 0 ? ', ' + repairCount + ' phiếu sửa chữa' : '') + ' trong khoảng chọn';
                }

                const debtNotice = document.getElementById('profit-debt-notice');
                if (debtNotice) {
                    if (profitFromDebt > 0) {
                        debtNotice.textContent = '⚠️ Chú ý: Bao gồm ' + profitFromDebt.toLocaleString('vi-VN') + ' từ đơn công nợ';
                        debtNotice.style.display = '';
                        debtNotice.style.color = '#f59e0b';
                        debtNotice.style.marginTop = '6px';
                        debtNotice.style.fontWeight = '600';
                    } else {
                        debtNotice.style.display = 'none';
                    }
                }

                // Cập nhật thông tin tóm tắt
                const activityDesc = document.querySelector('.activity-desc');
                if (activityDesc) {
                    const profitMargin = revenue > 0 ? ((profit / revenue) * 100).toFixed(1) : 0;
                    const repairText = repairCount > 0 ? ', ' + repairCount + ' phiếu sửa chữa' : '';
                    activityDesc.textContent = `Doanh thu: ${revenue.toLocaleString('vi-VN')} VNĐ - ${orderCount} đơn hàng${repairText} - Lợi nhuận: ${profitMargin}%`;
                }
            }

            // Cập nhật danh sách đơn hàng hiển thị theo bộ lọc
            updateOrdersList(filteredOrders) {
                // Tìm container chứa danh sách đơn hàng

                    }).join('');
                }

                // Cập nhật nội dung
                if (ordersContainer.tagName === 'TBODY') {
                    ordersContainer.innerHTML = ordersHTML;
                } else {
                    ordersContainer.innerHTML = `<table class="order-table"><tbody>${ordersHTML}</tbody></table>`;

            }

        // Global function to close modal (called from onclick)
        function closeModal(element) {
            if (element) {

                return;

            // Try to find and remove modal by common selectors

        // Global function for notifications
        function showNotification(message, type = 'info') {
            if (app) {
                app.showNotification(message, type);
            }
        }

        // Mobile menu toggle function
        function toggleMobileMenu() {
            const navMenu = document.getElementById('mainNavMenu');
            const overlay = document.getElementById('mobileOverlay');
            
            if (navMenu && overlay) {
                const isOpen = navMenu.classList.contains('mobile-open');
                
                if (isOpen) {
                    navMenu.classList.remove('mobile-open');
                    overlay.classList.remove('active');
                } else {
                    navMenu.classList.add('mobile-open');
                    overlay.classList.add('active');
                }
            }
        }

        // Đóng menu mobile khi bấm vào mục menu (dùng event delegation để chắc chắn hoạt động)
        document.addEventListener('click', function(e) {
            if (e.target.closest('.nav-item') && window.innerWidth <= 768) {
                const navMenu = document.getElementById('mainNavMenu');
                const overlay = document.getElementById('mobileOverlay');
                if (navMenu && overlay) {
                    navMenu.classList.remove('mobile-open');
                    overlay.classList.remove('active');
                }
            }
        });

        // Handle window resize - close menu on larger screens
        document.addEventListener('DOMContentLoaded', function() {
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    const navMenu = document.getElementById('mainNavMenu');
                    const overlay = document.getElementById('mobileOverlay');
                    if (navMenu && overlay) {
                        navMenu.classList.remove('mobile-open');
                        overlay.classList.remove('active');
                    }
                }
            });
        });
    </script>
</body>
</html>
