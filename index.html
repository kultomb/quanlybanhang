            updateRepair(event, index) {
                event.preventDefault();
                const form = event.target;
                const formData = new FormData(form);

                let customerName = formData.get('customerName') || '';
                const customerId = formData.get('customerId');
                if (customerId) {
                    const c = this.demoData.customers.find(x => x.id === customerId);
                    if (c) customerName = c.name;
                }
                if (!customerName.trim()) {
                    this.showNotification('Vui lòng chọn hoặc nhập tên khách hàng', 'error');
                    return;
                }

                const r = this.demoData.repairs[index];
                const parts = [];
                const products = this.demoData.products || [];
                const container = form.querySelector('#repair-edit-parts');
                const rows = container ? container.querySelectorAll('.repair-part-row') : [];
                for (const row of rows) {
                    const productIdInput = row.querySelector('input[name^="partProductId_"]');
                    const qtyInput = row.querySelector('input[name^="partQuantity_"]');
                    const priceInput = row.querySelector('input[name^="partPrice_"]');
                    if (!productIdInput || !productIdInput.value) continue;
                    const pid = productIdInput.value;
                    const prod = products.find(p => p.id === pid);
                    if (!prod) continue;
                    const qty = parseInt(qtyInput && qtyInput.value, 10) || 1;
                    const price = this.parsePrice(priceInput && priceInput.value) || prod.price || 0;
                    parts.push({
                        productId: pid,
                        name: prod.name,
                        quantity: qty,
                        price: price
                    });
                }

                const repairCost = this.parsePrice(formData.get('repairCost'));
                const productsData = this.demoData.products || [];
                const oldParts = r.parts || [];
                const oldByProduct = {};
                oldParts.forEach(p => { if (p.productId) oldByProduct[p.productId] = (oldByProduct[p.productId] || 0) + (p.quantity || 0); });
                const newByProduct = {};
                parts.forEach(p => { if (p.productId) newByProduct[p.productId] = (newByProduct[p.productId] || 0) + (p.quantity || 0); });
                const allPids = new Set([...Object.keys(oldByProduct), ...Object.keys(newByProduct)]);
                for (const pid of allPids) {
                    const prod = productsData.find(x => x.id === pid);
                    if (!prod) continue;
                    const oldQty = oldByProduct[pid] || 0;
                    const newQty = newByProduct[pid] || 0;
                    const delta = newQty - oldQty;
                    if (delta > 0) {
                        const stock = (prod.hasImei && prod.imeis) ? (prod.stock != null ? prod.stock : prod.imeis.length) : (prod.stock || 0);
                        if (stock < delta) {
                            this.showNotification(`Tồn kho ${prod.name} không đủ (cần thêm ${delta}, hiện ${stock})`, 'error');
                            return;
                        }
                    }
                }
                oldParts.forEach(p => {
                    if (!p.productId) return;
                    const idx = productsData.findIndex(x => x.id === p.productId);
                    if (idx !== -1) {
                        const pr = this.demoData.products[idx];
                        pr.stock = (pr.stock || 0) + (p.quantity || 0);
                    }
                });
                parts.forEach(p => {
                    if (!p.productId) return;
                    const idx = productsData.findIndex(x => x.id === p.productId);
                    if (idx !== -1) {
                        const pr = this.demoData.products[idx];
                        pr.stock = Math.max(0, (pr.stock || 0) - (p.quantity || 0));
                    }
                });
                r.customerId = customerId || null;
                r.customerName = customerName;
                r.phone = formData.get('phone') || '';
                r.address = formData.get('address') || '';
                r.deviceName = formData.get('deviceName') || '';
                r.repairDescription = formData.get('repairDescription') || '';
                r.imei = formData.get('imei') || '';
                r.deviceCondition = formData.get('deviceCondition') || '';
                r.password = formData.get('password') || '';
                r.repairCost = repairCost;
                r.partsManualCost = this.parsePrice(formData.get('partsManualCost'));
                const amountPaid = Math.max(0, this.parsePrice(formData.get('amountPaid')) || 0);
                const paymentStatus = amountPaid >= repairCost ? 'Đã thanh toán' : 'Công nợ';
                const oldRepairDebt = (r.status === 'Đã trả' && r.paymentStatus === 'Công nợ') ? Math.max(0, (Number(r.repairCost) || 0) - (Number(r.amountPaid) ?? 0)) : 0;
                const newRepairDebt = (formData.get('status') === 'Đã trả' && paymentStatus === 'Công nợ') ? Math.max(0, repairCost - amountPaid) : 0;
                const oldCustId = r.customerId;
                const newCustId = customerId || null;
                if (oldRepairDebt > 0 && oldCustId) {
                    const oldCust = this.demoData.customers.find(c => c.id === oldCustId);
                    if (oldCust) oldCust.debt = Math.max(0, (oldCust.debt || 0) - oldRepairDebt);
                }
                if (newRepairDebt > 0 && newCustId) {
                    const newCust = this.demoData.customers.find(c => c.id === newCustId);
                    if (newCust) newCust.debt = (newCust.debt || 0) + newRepairDebt;
                }
                r.amountPaid = amountPaid;
                r.paymentStatus = paymentStatus;
                r.parts = parts;
                r.warrantyPeriod = formData.get('warrantyPeriod') || '';
                r.status = formData.get('status') || 'Đang sửa';
                r.notes = formData.get('notes') || '';
                this.saveToLocalStorage();
                this.showNotification('Đã cập nhật phiếu ' + r.id, 'success');
                this.loadPage('repairs');
                const modal = form.closest('div[style*="fixed"]'); if (modal) modal.remove();
            }

            markRepairPaid(index) {
                const r = this.demoData.repairs[index];
                if (!r) return;
                const cost = Number(r.repairCost) || 0;
                const oldDebt = (r.status === 'Đã trả' && r.paymentStatus === 'Công nợ' && r.customerId) ? Math.max(0, cost - (Number(r.amountPaid) ?? 0)) : 0;
                r.amountPaid = cost;
                r.paymentStatus = 'Đã thanh toán';
                if (oldDebt > 0 && r.customerId) {
                    const cust = this.demoData.customers.find(c => c.id === r.customerId);
                    if (cust) cust.debt = Math.max(0, (cust.debt || 0) - oldDebt);
                }
                this.saveToLocalStorage();
                this.showNotification(`Đã đánh dấu phiếu ${r.id || ''} thanh toán xong`, 'success');
                this.loadPage('repairs');
            }

            deleteRepair(index) {
                const r = this.demoData.repairs[index];
                if (!r) return;
                if (confirm('Bạn có chắc muốn xóa phiếu sửa chữa ' + (r.id || 'này') + '?')) {
                    if (r.status === 'Đã trả' && r.paymentStatus === 'Công nợ' && r.customerId) {
                        const repairDebt = Math.max(0, (Number(r.repairCost) || 0) - (Number(r.amountPaid) ?? 0));
                        if (repairDebt > 0) {
                            const cust = this.demoData.customers.find(c => c.id === r.customerId);
                            if (cust) cust.debt = Math.max(0, (cust.debt || 0) - repairDebt);
                        }
                    }
                    (r.parts || []).forEach(p => {
                        if (!p.productId) return;
                        const idx = this.demoData.products.findIndex(x => x.id === p.productId);
                        if (idx !== -1) {
                            const pr = this.demoData.products[idx];
                            pr.stock = (pr.stock || 0) + (p.quantity || 0);
                        }
                    });
                    this.demoData.repairs.splice(index, 1);
                    this.saveToLocalStorage();
                    this.showNotification('Đã xóa phiếu sửa chữa và hoàn kho linh kiện', 'success');
                    this.loadPage('repairs');
                }
            }

            printRepair(index) {
                const r = this.demoData.repairs[index];
                if (!r) {
                    this.showNotification('Không tìm thấy phiếu sửa chữa', 'error');
                    return;
                }
                const repairId = r.id || 'SC' + String(index + 1).padStart(4, '0');
                const repairCost = Number(r.repairCost) || 0;

                pw.document.write(`
                    <!DOCTYPE html>

                    </head>
                    <body>

                                    <div class="info-row"><span class="info-label">Trạng thái:</span><span class="info-value">&nbsp;${(r.status || '-').replace(/</g, '&lt;')}</span></div>

                            ${r.imei ? '<div class="info-row" style="margin-bottom: 2px;"><span class="info-label">IMEI:</span><span class="info-value">&nbsp;' + (r.imei || '').replace(/</g, '&lt;') + '</span></div>' : ''}
                            ${r.deviceCondition ? '<div class="section-title">Hiện trạng máy khi nhận</div><div class="repair-desc">' + (r.deviceCondition || '').replace(/</g, '&lt;').replace(/\n/g, '<br>') + '</div>' : ''}

                pw.document.close();

            // Tính lợi nhuận thực theo giá vốn từng sản phẩm. Tính cho tất cả đơn (cả Công nợ và Đã TT) – đòi được hay không là việc của chủ cửa hàng.
            calcOrderProfit(order) {
                if (!order.products || !order.products.length) return 0;
                let profit = 0;
                const products = this.demoData.products || [];
                order.products.forEach(item => {
                    let prod = products.find(p => p.id === item.id || p.id === item.productId);
                    if (!prod && item.name) {
                        prod = products.find(p => (p.name || '').trim() === (item.name || '').trim());
                    }
                    const importPrice = prod && (prod.importPrice != null && prod.importPrice !== '') ? Number(prod.importPrice) : 0;
                    const qty = item.quantity || 0;
                    const beforeDiscount = (item.price || 0) * qty;
                    const isVnd = (item.discountType || 'vnd') === 'vnd';
                    const discountVal = item.discount || 0;
                    const discountAmount = isVnd ? Math.min(discountVal, beforeDiscount) : (beforeDiscount * discountVal / 100);
                    const revenue = Math.max(0, beforeDiscount - discountAmount);
                    const cost = qty * importPrice;
                    if (importPrice > 0) profit += revenue - cost;
                });
                return profit;
            }

            calcRepairProfit(repair) {
                // Chỉ tính khi đã trả cho khách (đã thu tiền)
                if ((repair.status || '') !== 'Đã trả') return 0;
                const repairCost = Number(repair.repairCost) || 0;
                const partsManualCost = Number(repair.partsManualCost) || 0;
                // Lợi nhuận = Báo giá - Giá linh kiện (partsManualCost + chi phí linh kiện từ sản phẩm)
                let partsCost = partsManualCost;
                const products = this.demoData.products || [];
                (repair.parts || []).forEach(p => {
                    const prod = products.find(x => x.id === p.productId);
                    const importPrice = prod && (prod.importPrice != null && prod.importPrice !== '') ? Number(prod.importPrice) : 0;
                    partsCost += (p.quantity || 0) * importPrice;
                });
                return Math.max(0, repairCost - partsCost);
            }

            getReportsContent() {
                this.initFilterState();
                const fromDate = (this.filterState && this.filterState.fromDate) || this.getDefaultFromDate();
                const toDate = (this.filterState && this.filterState.toDate) || this.getDefaultToDate();
                const filteredOrders = (this.demoData.orders || []).filter(order => {
                    const orderDate = new Date(order.date);
                    const startDate = new Date(fromDate);
                    const endDate = new Date(toDate);
                    endDate.setHours(23, 59, 59, 999);
                    return orderDate >= startDate && orderDate <= endDate;
                });
                const filteredRepairs = (this.demoData.repairs || []).filter(rep => {
                    const repDate = rep.date ? new Date(rep.date) : null;
                    if (!repDate || isNaN(repDate.getTime())) return false;
                    const startDate = new Date(fromDate);
                    const endDate = new Date(toDate);
                    endDate.setHours(23, 59, 59, 999);
                    return repDate >= startDate && repDate <= endDate;
                });
                const repairRevenue = filteredRepairs.reduce((s, r) => {
                    if ((r.status || '') !== 'Đã trả') return s;
                    return s + (Number(r.repairCost) || 0);
                }, 0);
                const totalRevenue = filteredOrders.reduce((s, o) => s + (o.total || 0), 0) + repairRevenue;
                const orderProfit = filteredOrders.reduce((s, o) => s + this.calcOrderProfit(o), 0);
                const repairProfit = filteredRepairs.reduce((s, r) => s + this.calcRepairProfit(r), 0);
                const totalProfit = orderProfit + repairProfit;
                const profitFromDebt = filteredOrders.filter(o => o.paymentStatus === 'Công nợ').reduce((s, o) => s + this.calcOrderProfit(o), 0);
                const profitMargin = totalRevenue > 0 ? ((totalProfit / totalRevenue) * 100).toFixed(1) : 0;
                return `
                    <div class="fade-in">
                        <!-- Bộ lọc ngày tháng -->
                        <div class="filter-section" style="background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">

                                    <span>📅</span> Bộ lọc thời gian
                                </h3>

                                    <span id="filter-toggle-icon">📁</span> Thu gọn
                                </button>
                            </div>
                            
                            <div id="filter-content" class="filter-content">
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px;">
                                    <div>
                                        <label style="display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-secondary);">Từ ngày:</label>
                                        <input type="date" id="filter-from-date" value="${fromDate}" 
                                               style="width: 100%; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 6px; font-size: 14px;">
                                    </div>
                                    
                                    <div>
                                        <label style="display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-secondary);">Đến ngày:</label>
                                        <input type="date" id="filter-to-date" value="${toDate}" 
                                               style="width: 100%; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 6px; font-size: 14px;">
                                    </div>
                                    
                                    <div>
                                        <label style="display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-secondary);">Lựa chọn nhanh:</label>
                                        <select id="filter-quick-select" onchange="app.applyQuickFilter(this.value)"
                                                style="width: 100%; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 6px; font-size: 14px;">
                                            <option value="" ${!(fromDate === toDate && fromDate === this.getVietnamTime().toISOString().split('T')[0]) ? 'selected' : ''}>Tùy chỉnh</option>
                                            <option value="today" ${fromDate === toDate && fromDate === this.getVietnamTime().toISOString().split('T')[0] ? 'selected' : ''}>Hôm nay</option>
                                            <option value="yesterday">Hôm qua</option>
                                            <option value="this-week">Tuần này</option>
                                            <option value="last-week">Tuần trước</option>
                                            <option value="this-month">Tháng này</option>
                                            <option value="last-month">Tháng trước</option>
                                            <option value="last-30-days">30 ngày qua</option>
                                            <option value="last-90-days">90 ngày qua</option>
                                            <option value="this-year">Năm này</option>
                                            <option value="last-year">Năm trước</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div style="display: flex; gap: 12px; align-items: center;">
                                    <button onclick="app.applyDateFilter()" 
                                            style="background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;">
                                        🔍 Áp dụng bộ lọc
                                    </button>
                                    <button onclick="app.resetDateFilter()" 
                                            style="background: white; color: var(--text-secondary); border: 2px solid #e5e7eb; padding: 10px 20px; border-radius: 6px; cursor: pointer;">

                                    <div id="filter-info" style="color: var(--text-secondary); font-size: 14px; margin-left: 8px;">

                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="stats-grid" style="margin-bottom: 24px;">
                            <div class="stat-card revenue">
                                <div class="stat-header">
                                    <span class="stat-title">Doanh thu</span>
                                    <span class="stat-icon">📈</span>
                                </div>
                                <div class="stat-value">${totalRevenue.toLocaleString('vi-VN')} VNĐ</div>
                                <div class="stat-change positive">${filteredOrders.length} đơn hàng${filteredRepairs.length > 0 ? ', ' + filteredRepairs.length + ' phiếu sửa chữa' : ''} trong khoảng chọn</div>
                            </div>
                            
                            <div class="stat-card info">
                                <div class="stat-header">
                                    <span class="stat-title">Lợi nhuận</span>
                                    <span class="stat-icon">💎</span>
                                </div>
                                <div class="stat-value">${totalProfit.toLocaleString('vi-VN')} VNĐ</div>
                                <div class="stat-change positive">Biên lợi nhuận ${profitMargin}%</div>
                                <div id="profit-debt-notice" class="stat-change" style="${profitFromDebt > 0 ? 'color: #f59e0b; margin-top: 6px; font-weight: 600;' : 'display: none;'}">${profitFromDebt > 0 ? '⚠️ Chú ý: Bao gồm ' + profitFromDebt.toLocaleString('vi-VN') + ' từ đơn công nợ' : ''}</div>
                            </div>
                        </div>
                        
                        <div id="reports-orders-section" style="background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); ${filteredOrders.length === 0 ? 'display: none;' : ''}">
                            <h3 style="margin-bottom: 16px; color: var(--text-primary); display: flex; align-items: center; gap: 8px;">
                                <span>📋</span> Đơn hàng trong khoảng chọn (${filteredOrders.length})
                            </h3>
                            <div style="overflow-x: auto;">
                                <table style="width: 100%; border-collapse: collapse;">
                                    <thead>
                                        <tr style="background: #f8fafc;">
                                            <th style="padding: 12px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 600;">Mã đơn</th>
                                            <th style="padding: 12px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 600;">Khách hàng</th>
                                            <th style="padding: 12px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 600;">Sản phẩm</th>
                                            <th style="padding: 12px; text-align: right; border-bottom: 2px solid #e5e7eb; font-weight: 600;">Tổng tiền</th>
                                            <th style="padding: 12px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 600;">Thanh toán</th>
                                            <th style="padding: 12px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 600;">Trạng thái</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${filteredOrders.map(o => {
                                            const productsStr = (o.products || []).map(p => (p.name || p.productName || '-') + ' x' + (p.quantity || 1)).join(', ');
                                            return `<tr style="border-bottom: 1px solid #e5e7eb;">
                                                <td style="padding: 12px;">${(o.id || '').replace(/</g, '&lt;')}</td>
                                                <td style="padding: 12px;">${(o.customerName || '-').replace(/</g, '&lt;')}</td>
                                                <td style="padding: 12px; max-width: 360px; font-size: 13px;" title="${(productsStr || '-').replace(/"/g, '&quot;')}">${(productsStr || '-').replace(/</g, '&lt;').substring(0, 80)}${(productsStr || '').length > 80 ? '…' : ''}</td>
                                                <td style="padding: 12px; text-align: right; font-weight: 600;">${(o.total || 0).toLocaleString('vi-VN')} đ</td>
                                                <td style="padding: 12px;"><span style="padding: 3px 8px; border-radius: 6px; font-size: 11px; background: ${o.paymentStatus === 'Đã thanh toán' ? '#dcfce7' : '#fef3c7'}; color: ${o.paymentStatus === 'Đã thanh toán' ? '#166534' : '#b45309'};">${(o.paymentStatus || '-').replace(/</g, '&lt;')}</span></td>
                                                <td style="padding: 12px;">${(o.status || '-').replace(/</g, '&lt;')}</td>
                                            </tr>`;

                        </div>
                        
                        <div id="reports-repairs-section" style="background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); ${filteredRepairs.length === 0 ? 'display: none;' : ''}">

                                <span>🔧</span> Phiếu sửa chữa trong khoảng chọn (${filteredRepairs.length})
                            </h3>
                            <div style="overflow-x: auto;">
                                <table style="width: 100%; border-collapse: collapse;">
                                    <thead>
                                        <tr style="background: #f8fafc;">

            getRecentActivities() {
                const activities = [];
                const now = this.getVietnamTime();
                const orders = (this.demoData && this.demoData.orders) || [];
                const products = (this.demoData && this.demoData.products) || [];
                const customers = (this.demoData && this.demoData.customers) || [];
                
                const recentOrders = orders.slice(0, 3);
                
                recentOrders.forEach((order, index) => {
                    if (!order || !order.date) return;
                    const orderTime = order.time || '00:00';
                    let orderDateTime = new Date(order.date + 'T' + orderTime + ':00');
                    if (isNaN(orderDateTime.getTime())) orderDateTime = new Date(order.date);
                    if (isNaN(orderDateTime.getTime())) orderDateTime = now;
                    
                    const todayStr = now.toISOString().split('T')[0];
                    let activityTime;
                    if (order.date === todayStr) {
                        activityTime = orderDateTime;
                    } else {
                        activityTime = new Date(now.getTime() - (30 + index * 45) * 60 * 1000);
                    }
                    
                    const icon = order.paymentStatus === 'Đã thanh toán' ? 'success' : 'info';
                    const emoji = order.paymentStatus === 'Đã thanh toán' ? '💰' : '📋';
                    const totalStr = (Number(order.total) || 0).toLocaleString('vi-VN');
                    const title = order.paymentStatus === 'Đã thanh toán' ? 
                        `Đơn hàng ${order.id || ''} đã hoàn thành` : 
                        `Đơn hàng mới ${order.id || ''}`;
                    const desc = order.paymentStatus === 'Đã thanh toán' ? 
                        `Khách hàng ${order.customerName || ''} đã thanh toán ${totalStr} VNĐ` :
                        `Khách hàng ${order.customerName || ''} đặt hàng trị giá ${totalStr} VNĐ`;
                        
                    activities.push({ icon, emoji, title, desc, time: activityTime });
                });
                
                // Sản phẩm sắp hết hàng
                const lowStockProducts = products.filter(p => p && (p.stock || 0) < 10);
                if (lowStockProducts.length > 0) {
                    const product = lowStockProducts[0];
                    const timeAgo = new Date(now.getTime() - 2 * 60 * 60 * 1000); // 2 giờ trước THẬT
                    activities.push({
                        icon: 'warning',
                        emoji: '⚠️',
                        title: 'Sản phẩm sắp hết hàng',
                        desc: `${product.name} chỉ còn ${product.stock} sản phẩm trong kho`,
                        time: timeAgo
                    });
                }
                
                // Khách hàng có công nợ
                const debtCustomers = customers.filter(c => c && (c.debt || 0) > 0);
                if (debtCustomers.length > 0) {
                    const customer = debtCustomers[0];
                    const timeAgo = new Date(now.getTime() - 3 * 60 * 60 * 1000);
                    activities.push({
                        icon: 'warning',
                        emoji: '💳',
                        title: 'Nhắc nợ khách hàng',
                        desc: `${customer.name || ''} có công nợ ${(customer.debt || 0).toLocaleString('vi-VN')} VNĐ`,
                        time: timeAgo
                    });
                }
                
                return activities.slice(0, 5).map(activity => `
                    <div class="activity-item">
                        <div class="activity-icon ${activity.icon}">${activity.emoji}</div>
                        <div class="activity-content">
                            <div class="activity-title">${activity.title}</div>
                            <div class="activity-desc">${activity.desc}</div>
                        </div>
                        <div class="activity-time">${this.getTimeAgo(activity.time)}</div>
                    </div>
                `).join('');
            }

            getSystemActivityHistory() {
                try {
                    let activities = window.FirebaseStorage.getMeta('system_activity_history') || [];
                    if (!Array.isArray(activities)) activities = [];
                
                // Nếu chưa có lịch sử, tạo một số hoạt động mẫu từ dữ liệu hiện tại
                if (activities.length === 0) {
                    activities = this.generateInitialActivityHistory();
                    if (Array.isArray(activities)) {
                        window.FirebaseStorage.setMeta('system_activity_history', activities);
                        window.FirebaseStorage.save({ meta: { system_activity_history: activities } });
                    }
                }
                
                // Sắp xếp theo thời gian mới nhất
                activities.sort((a, b) => new Date(b.time) - new Date(a.time));
                
                // Hiển thị 20 hoạt động gần nhất
                const recentActivities = activities.slice(0, 20);
                
                let html = `
                    <div style="margin-bottom: 16px;">
                        <h3 style="margin: 0; display: flex; align-items: center; gap: 8px;">
                            <span>🕒</span> Lịch sử Hoạt động Gần đây
                        </h3>
                    </div>
                    
                    <div style="max-height: 400px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb;">
                `;
                
                if (recentActivities.length === 0) {
                    html += `
                        <div style="padding: 40px; text-align: center; color: #6b7280;">
                            <div style="font-size: 48px; margin-bottom: 16px;">📝</div>
                            <p>Chưa có hoạt động nào được ghi nhận</p>
                        </div>
                    `;
                } else {
                    recentActivities.forEach((activity, index) => {
                        if (!activity || typeof activity !== 'object') return;
                        const timeAgo = this.getTimeAgoText(activity.time || '');
                        const borderBottom = index < recentActivities.length - 1 ? 'border-bottom: 1px solid #e5e7eb;' : '';
                        const title = (activity.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                        const desc = (activity.description || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                        const icon = activity.icon || '📋';
                        const type = ['success','info','warning'].includes(activity.type) ? activity.type : 'info';
                        
                        html += `
                            <div style="padding: 12px 16px; ${borderBottom} display: flex; align-items: flex-start; gap: 12px;">
                                <div class="activity-icon ${type}" style="width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;">
                                    ${icon}
                                </div>
                                <div style="flex: 1; min-width: 0;">
                                    <div style="font-weight: 600; color: var(--text-primary); margin-bottom: 4px;">
                                        ${title}
                                    </div>
                                    <div style="color: #6b7280; font-size: 14px; margin-bottom: 4px;">
                                        ${desc}
                                    </div>
                                    <div style="color: #9ca3af; font-size: 12px;">
                                        ${timeAgo}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += `
                    </div>
                    <div style="margin-top: 12px; padding: 12px; background: #f0f9ff; border-radius: 8px; font-size: 14px; color: #1e40af;">
                        <strong>💡 Thông tin:</strong> Hệ thống tự động ghi nhận tất cả các hoạt động quan trọng để bạn theo dõi.
                    </div>
                `;
                
                return html;
                } catch (err) {
                    console.error('getSystemActivityHistory error:', err);
                    return '<div style="padding: 20px; text-align: center; color: #6b7280;">Không thể tải lịch sử hoạt động.</div>';
                }
            }
            
            generateInitialActivityHistory() {
                try {
                    const now = this.getVietnamTime();
                    const activities = [];
                    const orders = (this.demoData && this.demoData.orders) ? this.demoData.orders : [];
                
                // Hoạt động từ đơn hàng gần đây
                orders.slice(0, 5).forEach((order, index) => {
                    if (!order || typeof order !== 'object') return;
                    const orderTime = new Date(now.getTime() - (30 + index * 15) * 60 * 1000);
                    const paymentStatus = order.paymentStatus || '';
                    const total = (order.total != null && !isNaN(order.total)) ? order.total : 0;
                    activities.push({
                        id: 'order_' + (order.id || index),
                        type: paymentStatus === 'Đã thanh toán' ? 'success' : 'info',
                        icon: paymentStatus === 'Đã thanh toán' ? '💰' : '📋',
                        title: `Đơn hàng ${order.id || index}`,
                        description: `${paymentStatus === 'Đã thanh toán' ? 'Đã thanh toán' : 'Tạo mới'} - Khách hàng: ${order.customerName || '-'} - Giá trị: ${total.toLocaleString('vi-VN')} VNĐ`,
                        time: orderTime.toISOString(),
                        category: 'order'
                    });
                });
                
                // Hoạt động hệ thống
                activities.push({
                    id: 'system_start',
                    type: 'info',
                    icon: '🚀',
                    title: 'Khởi động hệ thống',
                    description: 'Hệ thống PhuocIT đã được khởi động và sẵn sàng hoạt động',
                    time: new Date(now.getTime() - 2 * 60 * 60 * 1000).toISOString(),
                    category: 'system'
                });
                
                activities.push({
                    id: 'data_loaded',
                    type: 'success',
                    icon: '💾',
                    title: 'Tải dữ liệu thành công',
                    description: `Đã tải ${(this.demoData.customers || []).length} khách hàng, ${(this.demoData.products || []).length} sản phẩm, ${(this.demoData.orders || []).length} đơn hàng`,
                    time: new Date(now.getTime() - 90 * 60 * 1000).toISOString(),
                    category: 'system'
                });
                
                return activities;
                } catch (err) {
                    console.error('generateInitialActivityHistory error:', err);
                    return [{
                        id: 'system_start',
                        type: 'info',
                        icon: '🚀',
                        title: 'Khởi động hệ thống',
                        description: 'Hệ thống đã sẵn sàng hoạt động',
                        time: new Date().toISOString(),
                        category: 'system'
                    }];
                }
            }
            
            addActivityLog(type, icon, title, description, category = 'user') {
                let activities = window.FirebaseStorage.getMeta('system_activity_history') || [];
                if (!Array.isArray(activities)) activities = [];
                const newActivity = {
                    id: 'activity_' + Date.now(),
                    type: type,
                    icon: icon,
                    title: title,
                    description: description,
                    time: this.getVietnamTime().toISOString(),
                    category: category
                };
                activities.unshift(newActivity);
                if (activities.length > 100) activities = activities.slice(0, 100);
                window.FirebaseStorage.setMeta('system_activity_history', activities);
                window.FirebaseStorage.save({ meta: { system_activity_history: activities } });
            }
            

            
            getTimeAgoText(timeString) {
                if (!timeString) return '';
                const now = this.getVietnamTime();
                const time = new Date(timeString);
                if (isNaN(time.getTime())) return '';
                const diffMs = now - time;
                const diffMins = Math.floor(diffMs / (1000 * 60));
                const diffHours = Math.floor(diffMins / 60);
                const diffDays = Math.floor(diffHours / 24);
                
                if (diffMins < 1) return 'Vừa xong';
                if (diffMins < 60) return `${diffMins} phút trước`;
                if (diffHours < 24) return `${diffHours} giờ trước`;
                if (diffDays < 7) return `${diffDays} ngày trước`;
                
                return time.toLocaleDateString('vi-VN', {
                    day: '2-digit',
                    month: '2-digit', 
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
            
            showNotification(message, type = 'info') {
                const notification = document.getElementById('notification');
                if (!notification) return;
                
                notification.textContent = message;
                notification.className = `notification show ${type}`;
                
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }

                        startDate.setDate(startDate.getDate() - 30);
                        break;

                // Close the modal

                if(modal) modal.remove();
                
                // Generate report with date filter
                this.exportCustomerReportWithDateRange(customerId, customerName, startDate, endDate);

                    const orderDate = new Date(order.date.split('/').reverse().join('-'));

                    const filterEndDate = new Date(endDate);
                    
                    return orderDate >= filterStartDate && orderDate <= filterEndDate;

            backupProductsToExcel() {
                if (this.demoData.products.length === 0) {
                    this.showNotification('Không có sản phẩm nào để backup', 'warning');
                    return;
                }

                // Tạo dữ liệu Excel với tiêu đề tiếng Việt
                const headers = ['Mã SP', 'Tên sản phẩm', 'Danh mục', 'Giá bán', 'Giá nhập', 'Tồn kho', 'IMEI', 'Nhà cung cấp'];
                const excelData = [headers];
                
                this.demoData.products.forEach(product => {
                    const imeiStr = (product.imeis && product.imeis.length) ? product.imeis.join(', ') : '';
                    excelData.push([
                        product.id,
                        product.name,
                        product.category,
                        product.price,
                        product.importPrice || '',
                        product.stock,
                        imeiStr,
                        product.supplier || ''
                    ]);
                });

                // Tạo nội dung CSV
                const csvContent = excelData.map(row => 
                    row.map(field => {
                        // Xử lý field có dấu phẩy hoặc dấu ngoặc kép
                        if (typeof field === 'string' && (field.includes(',') || field.includes('"'))) {
                            return `"${field.replace(/"/g, '""')}"`;
                        }
                        return field;
                    }).join(',')
                ).join('\n');

                // Thêm BOM để Excel hiển thị đúng tiếng Việt
                const BOM = '\uFEFF';
                const csvWithBOM = BOM + csvContent;

                // Tạo và download file
                const blob = new Blob([csvWithBOM], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                link.setAttribute('href', url);
                link.setAttribute('download', `SanPham_Backup_${this.formatDateForFilename()}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                this.showNotification(`Đã backup ${this.demoData.products.length} sản phẩm ra file Excel`, 'success');
            }

            normalizeImportedCategory(rawCategory) {
                const input = (rawCategory == null ? '' : String(rawCategory)).trim();
                if (!input) return { value: '', missing: null };

                const categories = (this.demoData.categories || []).length ? this.demoData.categories : [];
                const normalize = (s) => {
                    const t = (s || '').toString().trim().toLowerCase().replace(/\s*>\s*/g, ' > ').replace(/\s+/g, ' ');
                    return t.normalize ? t.normalize('NFC') : t;
                };
                const normalizedInput = normalize(input);

                const parents = categories.filter(c => c.parent == null || c.parent === '');
                const children = categories.filter(c => c.parent != null && c.parent !== '');

                const parentByNorm = new Map();
                const allNamesNorm = new Map();
                parents.forEach(p => {
                    const n = normalize(p.name);
                    parentByNorm.set(n, p.name);
                    allNamesNorm.set(n, p.name);
                });

                const childCandidatesByName = new Map();
                const fullByNorm = new Map();
                parents.forEach(parent => {
                    const subs = children.filter(c => c.parent === parent.id);
                    subs.forEach(child => {
                        const full = `${parent.name} > ${child.name}`;
                        fullByNorm.set(normalize(full), full);
                        const key = normalize(child.name);
                        if (!childCandidatesByName.has(key)) childCandidatesByName.set(key, []);
                        childCandidatesByName.get(key).push(full);
                        if (!allNamesNorm.has(key)) allNamesNorm.set(key, child.name);
                    });
                });

                if (fullByNorm.has(normalizedInput)) return { value: fullByNorm.get(normalizedInput), missing: null };
                if (parentByNorm.has(normalizedInput)) return { value: parentByNorm.get(normalizedInput), missing: null };

                const childMatches = childCandidatesByName.get(normalizedInput) || [];
                if (childMatches.length === 1) return { value: childMatches[0], missing: null };
                if (childMatches.length > 1) return { value: input, missing: null };

                if (allNamesNorm.has(normalizedInput)) return { value: allNamesNorm.get(normalizedInput), missing: null };

                const found = categories.find(c => normalize(c.name) === normalizedInput);
                if (found) return { value: found.name, missing: null };

                return { value: '', missing: input };
            }

            uploadProductsFromExcel(event) {
                event.preventDefault();
                const form = event.target;
                const fileInput = form.querySelector('input[type="file"]');
                const duplicateAction = form.querySelector('input[name="duplicateAction"]:checked').value;
                
                if (!fileInput.files[0]) {
                    this.showNotification('Vui lòng chọn file Excel', 'error');
                    return;
                }

                const file = fileInput.files[0];
                const reader = new FileReader();

                reader.onload = (e) => {
                    try {
                        let csvData = e.target.result;
                        
                        // Loại bỏ BOM nếu có
                        if (csvData.charCodeAt(0) === 0xFEFF) {
                            csvData = csvData.slice(1);
                        }
                        
                        // Debug: Log raw data
                        console.log('Raw CSV Data:', csvData.substring(0, 200));
                        
                        const lines = csvData.split('\n').filter(line => line.trim());
                        console.log('Số dòng đọc được:', lines.length);
                        console.log('Dòng đầu tiên:', lines[0]);
                        
                        if (lines.length < 2) {
                            this.showNotification('File Excel phải có ít nhất 1 dòng tiêu đề và 1 dòng dữ liệu', 'error');
                            return;
                        }

                        const headerLine = lines[0].trim();
                        const dataLines = lines.slice(1);
                        const detectDelimiter = (str) => {
                            const byTab = str.split('\t');
                            if (byTab.length >= 7) return '\t';
                            const bySemi = str.split(';');
                            if (bySemi.length >= 7) return ';';
                            return ',';
                        };
                        const delimiter = detectDelimiter(headerLine);
                        const headerCols = this.parseCSVLineWithDelimiter(headerLine, delimiter);
                        const norm = (s) => (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
                        const findCol = (names) => {
                            const idx = headerCols.findIndex(h => names.some(n => norm(h).includes(n) || norm(h) === n));
                            return idx >= 0 ? idx : -1;
                        };
                        const colId = findCol(['mã sp', 'ma sp', 'masp', 'code']);
                        const colName = findCol(['tên sản phẩm', 'ten san pham', 'tên hàng', 'ten hang', 'name']);
                        const colCategory = findCol(['danh mục', 'danh muc', 'nhóm', 'nhom', 'category']);
                        const colPrice = findCol(['giá bán', 'gia ban', 'price']);
                        const colImportPrice = findCol(['giá nhập', 'gia nhap', 'giá vốn', 'gia von']);
                        const colStock = findCol(['tồn kho', 'ton kho', 'stock']);
                        const colImei = findCol(['imei']);
                        const colSupplier = findCol(['nhà cung cấp', 'nha cung cap', 'supplier']);
                        const useOrder = colId < 0 || colName < 0;
                        if (useOrder) {
                            console.log('Không nhận diện được tiêu đề cột, dùng thứ tự mặc định: Mã SP, Tên, Danh mục, Giá bán, Giá nhập, Tồn kho, IMEI');
                        } else {
                            console.log('Đã nhận diện cột theo tiêu đề:', { colId, colName, colCategory, colPrice, colStock, colImei });
                        }

                        const missingCategories = new Set();
                        dataLines.forEach((line, index) => {
                            if (!line.trim()) return;
                            const columns = this.parseCSVLineWithDelimiter(line.trim(), delimiter);
                            if (columns.length < 7) return;
                            const get = (idx) => (idx >= 0 && idx < columns.length ? columns[idx] : '');
                            const category = useOrder ? columns[2] : get(colCategory);
                            const catRes = this.normalizeImportedCategory(category);
                            if (catRes.missing) missingCategories.add(catRes.missing);
                        });

                        if (missingCategories.size > 0) {
                            const list = [...missingCategories];
                            const msg = list.map(c => `Tạo danh mục "${c}" ngay để tránh bị lỗi`).join('\n');
                            this.showNotification(msg, 'error');
                            const listHtml = list.map(c => `<li><strong>"${(c||'').replace(/</g,'&lt;')}"</strong></li>`).join('');
                            const modalHtml = `
                                <div id="missing-category-modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1002; display: flex; justify-content: center; align-items: center;" onclick="if(event.target===this) document.getElementById('missing-category-modal').remove()">
                                    <div style="background: white; padding: 24px; border-radius: 12px; width: 420px; max-width: 95vw; box-shadow: 0 4px 20px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">
                                        <h3 style="margin: 0 0 16px 0; color: #dc2626; font-size: 18px;">⚠️ Thiếu danh mục</h3>
                                        <p style="margin: 0 0 12px 0; font-size: 14px; color: #374151;">File Excel có danh mục chưa tồn tại trong hệ thống. Tạo các danh mục sau ngay để tránh bị lỗi:</p>
                                        <ul style="margin: 0 0 20px 0; padding-left: 20px; font-size: 14px; color: #1f2937; line-height: 1.8;">
                                            ${listHtml}
                                        </ul>
                                        <p style="margin: 0 0 20px 0; font-size: 13px; color: #6b7280;">Vào <strong>Quản lý Danh mục</strong> để tạo, sau đó quay lại Upload Excel.</p>
                                        <div style="display: flex; gap: 12px; justify-content: flex-end;">
                                            <button type="button" onclick="document.getElementById('missing-category-modal').remove();" style="padding: 10px 18px; border: 2px solid #e5e7eb; background: white; border-radius: 8px; cursor: pointer;">Đóng</button>
                                            <button type="button" onclick="document.getElementById('missing-category-modal').remove(); document.getElementById('upload-products-modal').remove(); app.loadPage('categories');" style="padding: 10px 18px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Đi tới Quản lý Danh mục</button>
                                        </div>
                                    </div>
                                </div>`;
                            document.body.insertAdjacentHTML('beforeend', modalHtml);
                            return;
                        }

                        let addedCount = 0;
                        let updatedCount = 0;
                        let skippedCount = 0;
                        let errorLines = [];

                        console.log('Bắt đầu xử lý', dataLines.length, 'dòng dữ liệu', 'delimiter:', JSON.stringify(delimiter));

                        dataLines.forEach((line, index) => {
                            if (!line.trim()) return;
                            
                            const columns = this.parseCSVLineWithDelimiter(line.trim(), delimiter);
                            
                            if (columns.length < 7) {
                                console.warn(`Dòng ${index + 2}: Chỉ có ${columns.length} cột`);
                                errorLines.push(`Dòng ${index + 2}: Không đủ cột (cần ít nhất 7)`);
                                skippedCount++;
                                return;
                            }
                            const get = (idx) => (idx >= 0 && idx < columns.length ? columns[idx] : '');
                            const id = useOrder ? columns[0] : get(colId);
                            const name = useOrder ? columns[1] : get(colName);
                            const category = useOrder ? columns[2] : get(colCategory);
                            const price = useOrder ? columns[3] : get(colPrice);
                            const importPrice = useOrder ? columns[4] : get(colImportPrice);
                            const stock = useOrder ? columns[5] : get(colStock);
                            const imeiCol = useOrder ? (columns[6] || '') : get(colImei);
                            const supplier = useOrder ? (columns[7] || '') : get(colSupplier);
                            
                            if (!id?.trim() || !name?.trim() || !price?.trim()) {
                                errorLines.push(`Dòng ${index + 2}: Thiếu Mã SP, Tên hoặc Giá bán`);
                                skippedCount++;
                                return;
                            }

                            const catRes = this.normalizeImportedCategory(category);
                            const catValue = catRes.value;
                            if (catRes.missing) return;

                            const cleanId = id.trim();
                            const existingIndex = this.demoData.products.findIndex(p => p.id === cleanId);
                            
                            const imeiRaw = (imeiCol || '').toString().trim();
                            const imeis = imeiRaw ? imeiRaw.split(/[\n,;]+/).map(v => v.trim()).filter(v => v.length > 0) : [];
                            const hasImei = imeis.length > 0;
                            const stockNum = parseInt(stock) || 0;
                            
                            const productData = {
                                id: cleanId,
                                name: name.trim(),
                                category: catValue,
                                price: parseInt(price) || 0,
                                importPrice: parseInt(importPrice) || 0,
                                stock: hasImei ? imeis.length : stockNum,
                                supplier: supplier ? supplier.trim() : '',
                                hasImei,
                                imeis: hasImei ? imeis : []
                            };

                            if (existingIndex !== -1) {
                                if (duplicateAction === 'update') {
                                    this.demoData.products[existingIndex] = productData;
                                    updatedCount++;
                                } else {
                                    skippedCount++;
                                }
                            } else {
                                this.demoData.products.push(productData);
                                addedCount++;
                            }
                        });

                        console.log('Upload results:', {addedCount, updatedCount, skippedCount});

                        this.saveToLocalStorage();
                        this.loadPage('products');

                        let message = `Upload hoàn tất: `;

                        this.showNotification(message, addedCount > 0 || updatedCount > 0 ? 'success' : 'warning');
                        const modal = form.closest("div[style*=\"fixed\"]");

                    } catch (error) {

                    }
                };

                reader.readAsText(file, 'UTF-8');

            parseCSVLineWithDelimiter(line, delimiter) {
                const raw = (line || '').trim();
                if (delimiter === '\t' || delimiter === ';') {
                    return raw.split(delimiter).map(c => String(c).replace(/^"|"$/g, '').trim());
                }
                const columns = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"' && !inQuotes) inQuotes = true;
                    else if (char === '"' && inQuotes) {
                        if (line[i + 1] === '"') { current += '"'; i++; }
                        else inQuotes = false;
                    } else if (char === ',' && !inQuotes) {
                        columns.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                columns.push(current.trim());
                return columns;
            }
            parseCSVLine(line) {
                const raw = line.trim();
                if (raw.includes('\t')) {
                    const byTab = raw.split('\t').map(c => c.replace(/^"|"$/g, '').trim());
                    if (byTab.length >= 7) return byTab;
                }
                if (raw.includes(';') && raw.split(';').length >= 7) {
                    return raw.split(';').map(c => String(c).replace(/^"|"$/g, '').trim());
                }
                const columns = [];
                let current = '';
                let inQuotes = false;
                
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    
                    if (char === '"' && !inQuotes) {
                        inQuotes = true;
                    } else if (char === '"' && inQuotes) {
                        if (line[i + 1] === '"') {
                            current += '"';
                            i++; // Skip next quote
                        } else {
                            inQuotes = false;
                        }
                    } else if (char === ',' && !inQuotes) {
                        columns.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                
                columns.push(current.trim());
                return columns;
            }

            validatePhoneVN(value) {
                const v = (value || '').trim().replace(/\s/g, '');
                return /^(0|\+84)[0-9]{9,10}$/.test(v) || /^84[0-9]{9,10}$/.test(v);
            }
            validateEmail(value) {
                if (!value || !value.trim()) return true;
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
            }
            validatePositiveNumber(value) {
                const n = parseFloat(value);
                return !isNaN(n) && n >= 0;
            }
            validateFormCustomer(form) {
                const fd = new FormData(form);
                const name = (fd.get('name') || '').trim();
                const phone = (fd.get('phone') || '').trim();
                const email = (fd.get('email') || '').trim();
                const type = fd.get('type');
                const companyName = (fd.get('companyName') || '').trim();
                let valid = true;
                if (!name) { this.setFieldError(form, 'name', 'Vui lòng nhập tên khách hàng.'); valid = false; }
                if (phone && !this.validatePhoneVN(phone)) { this.setFieldError(form, 'phone', 'Số điện thoại không hợp lệ (VD: 0901234567).'); valid = false; }
                if (email && !this.validateEmail(email)) { this.setFieldError(form, 'email', 'Email không đúng định dạng.'); valid = false; }
                if (type === 'doanh-nghiep' && !companyName) { this.setFieldError(form, 'companyName', 'Vui lòng nhập tên công ty.'); valid = false; }
                return valid;
            }
            validateFormProduct(form) {
                const fd = new FormData(form);
                const name = (fd.get('name') || '').trim();
                const price = parseFloat(fd.get('price'));
                const importPrice = parseFloat(fd.get('importPrice'));
                const stock = fd.get('stock');
                const minStock = fd.get('minStock');
                let valid = true;
                if (!name) { this.setFieldError(form, 'name', 'Vui lòng nhập tên sản phẩm.'); valid = false; }
                if (isNaN(price) || price < 0) { this.setFieldError(form, 'price', 'Giá bán phải là số không âm.'); valid = false; }
                if (isNaN(importPrice) || importPrice < 0) { this.setFieldError(form, 'importPrice', 'Giá nhập phải là số không âm.'); valid = false; }
                const modeImei = !!fd.get('stockModeImei');
                if (!modeImei) {
                    const s = parseInt(stock, 10);
                    if (isNaN(s) || s < 0) { this.setFieldError(form, 'stock', 'Số lượng tồn kho không hợp lệ.'); valid = false; }
                    const m = parseInt(minStock, 10);
                    if (isNaN(m) || m < 0) { this.setFieldError(form, 'minStock', 'Tồn kho tối thiểu không hợp lệ.'); valid = false; }
                }
                return valid;
            }

            performBackup() {
                const backupData = {
                    version: '1.0',
                    timestamp: this.getVietnamTime().toISOString(),
                    data: this.demoData,
                    metadata: {
                        totalCustomers: this.demoData.customers.length,
                        totalSuppliers: this.demoData.suppliers.length,
                        totalProducts: this.demoData.products.length,
                        totalSales: (this.demoData.orders || []).length
                    }
                };
                
                const jsonString = JSON.stringify(backupData, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                const vietnamTime = this.getVietnamTime();
                link.download = `HaMobile_backup_${vietnamTime.toISOString().split('T')[0]}_${vietnamTime.toTimeString().split(' ')[0].replace(/:/g, '')}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                URL.revokeObjectURL(url);
                const backupTime = this.getVietnamTime().toISOString();
                window.FirebaseStorage.setMeta('last_backup_time', backupTime);
                window.FirebaseStorage.save({ meta: { last_backup_time: backupTime } });
                
                // Cập nhật UI tại chỗ, không reload trang (tránh nháy)
                if (this.currentPage === 'settings') {
                    const el = document.getElementById('backup-last-time');
                    if (el) el.textContent = new Date(backupTime).toLocaleString('vi-VN');
                }
            }
            
            restoreFromFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                if (file.type !== 'application/json') {
                    this.showNotification('Vui lòng chọn file JSON hợp lệ', 'error');

                    const sizeInMB = (sizeInBytes / (1024 * 1024)).toFixed(2);
                    
                    if (sizeInBytes < 1024) {

            // Compress image before saving to Firebase
            compressImage(file, quality = 0.7, maxWidth = 300, maxHeight = 300) {
                return new Promise((resolve, reject) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    
                    img.onload = () => {
                        // Calculate new dimensions maintaining aspect ratio
                        let { width, height } = img;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height = height * (maxWidth / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = width * (maxHeight / height);
                                height = maxHeight;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        // Draw and compress
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    
                    img.onerror = () => reject(new Error('Failed to load image'));
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        img.src = e.target.result;
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsDataURL(file);
                });
            }

            createSaleOrder(event) {
                event.preventDefault();
                const form = event.target;
                const formData = new FormData(form);
                
                const products = formData.getAll('products[]');
                const quantities = formData.getAll('quantities[]');
                const prices = formData.getAll('prices[]');
                
                if (products.length === 0 || products[0] === '') {
                    this.showNotification('Vui lòng chọn ít nhất một sản phẩm', 'error');
                    return;
                }
                
                // Tạo thông tin khách hàng từ form
                const customerInfo = {
                    name: formData.get('customerName'),
                    phone: formData.get('customPhuocIThone'),
                    address: formData.get('customerAddress')
                };
                let total = 0;
                const items = [];
                
                for (let i = 0; i < products.length; i++) {
                    if (products[i] && quantities[i] && prices[i]) {
                        const product = this.demoData.products.find(p => p.id === products[i]);
                        const qty = parseInt(quantities[i]);
                        const price = parseInt(prices[i]);
                        
                        // Check stock
                        if (qty > product.stock) {
                            this.showNotification(`Không đủ hàng cho sản phẩm ${product.name}. Còn lại: ${product.stock}`, 'error');
                            return;
                        }
                        
                        items.push({
                            productId: products[i],
                            productName: product.name,
                            quantity: qty,
                            price: price,
                            subtotal: qty * price
                        });
                        
                        total += qty * price;
                        
                        // Update stock
                        product.stock -= qty;
                    }
                }
                
                const newSale = {
                    id: 'DH' + String(this.demoData.sales.length + 1).padStart(3, '0'),
                    date: this.getVietnamTime().toISOString().split('T')[0],
                    customer: customerInfo.name,
                    customPhuocIThone: customerInfo.phone,
                    customerAddress: customerInfo.address,
                    notes: formData.get('orderNotes') || '',
                    total: total,
                    status: 'Chờ xử lý',
                    items: items.length,
                    itemDetails: items
                };
                
                this.demoData.sales.unshift(newSale);
                this.saveToLocalStorage();
                this.showNotification(`Đã tạo đơn hàng ${newSale.id} thành công`, 'success');
                this.loadPage('sales');
                const modal = form.closest("div[style*=\"fixed\"]"); if(modal) modal.remove();
            }

            addProductFromForm(form, createAnother) {
                this.clearFieldErrors(form);
                if (!this.validateFormProduct(form)) return;
                const formData = new FormData(form);
                // Xử lý IMEI (mỗi máy 1 IMEI, có thể dán nhiều IMEI cách nhau bởi , ; hoặc xuống dòng)
                const imeiRaw = (formData.get('imei') || '').toString().trim();
                const imeis = imeiRaw ? imeiRaw.split(/[\n,;]+/).map(v => v.trim()).filter(v => v.length > 0) : [];
                const stockModeImei = !!formData.get('stockModeImei');
                const hasImei = stockModeImei && imeis.length > 0;
                
                const newProduct = {
                    id: 'SP' + String(this.demoData.products.length + 1).padStart(3, '0'),
                    name: formData.get('name'),
                    category: formData.get('category'),
                    importPrice: this.parsePrice(formData.get('importPrice')),
                    price: this.parsePrice(formData.get('price')),
                    stock: hasImei ? imeis.length : parseInt(formData.get('stock') || '0'),
                    minStock: hasImei ? 0 : (() => { const m = parseInt(formData.get('minStock'), 10); return isNaN(m) ? 10 : Math.max(0, m); })(),
                    supplier: formData.get('supplier'),
                    hasImei,
                    imeis: hasImei ? imeis : []
                };
                
                this.demoData.products.push(newProduct);
                this.saveToLocalStorage();
                this.showNotification(`Đã thêm sản phẩm ${newProduct.name}`, 'success');
                if (createAnother) {
                    form.querySelector('input[name="name"]').value = '';
                    const imeiInput = form.querySelector('input[name="imei"]');
                    if (imeiInput) imeiInput.value = '';
                    const importPriceInput = form.querySelector('input[name="importPrice"]');
                    if (importPriceInput) importPriceInput.value = '';
                    const priceInput = form.querySelector('input[name="price"]');
                    if (priceInput) priceInput.value = '';
                    const stockInput = form.querySelector('input[name="stock"]');
                    if (stockInput) stockInput.value = '';
                    form.querySelector('input[name="name"]').focus();
                } else {
                    const modal = document.getElementById('add-product-modal') || form.closest("div[style*=\"fixed\"]");
                    if (modal) modal.remove();
                    this.loadPage('products');
                }
            }

            handleStockModeChange(checkbox) {
                const form = checkbox.closest('form');
                if (!form) return;

                const qtyCheckbox = form.querySelector('input[name="stockModeQuantity"]');
                const imeiCheckbox = form.querySelector('input[name="stockModeImei"]');

                if (!qtyCheckbox || !imeiCheckbox) return;

                if (checkbox === qtyCheckbox && qtyCheckbox.checked) {
                    imeiCheckbox.checked = false;
                } else if (checkbox === imeiCheckbox && imeiCheckbox.checked) {
                    qtyCheckbox.checked = false;
                }

                if (!qtyCheckbox.checked && !imeiCheckbox.checked) {
                    qtyCheckbox.checked = true;
                }

                const mode = imeiCheckbox.checked ? 'imei' : 'quantity';
                const quantitySection = form.querySelector('[data-stock-mode="quantity"]');
                const imeiSection = form.querySelector('[data-stock-mode="imei"]');
                const stockInput = form.querySelector('input[name="stock"]');
                const imeiField = form.querySelector('[name="imeis"]') || form.querySelector('input[name="imei"]');

                if (quantitySection) quantitySection.style.display = mode === 'quantity' ? 'grid' : 'none';
                if (imeiSection) imeiSection.style.display = mode === 'imei' ? 'block' : 'none';

                if (stockInput) {
                    stockInput.disabled = mode === 'imei';
                    stockInput.required = mode === 'quantity';
                }
                if (imeiField) {
                    imeiField.disabled = mode === 'quantity';
                }
            }

            // Cập nhật sản phẩm
            updateProduct(event, productId) {
                event.preventDefault();
                const form = event.target;
                const formData = new FormData(form);

                // Xử lý IMEI (nếu có)
                const imeiRaw = (formData.get('imeis') || '').toString();
                const imeis = imeiRaw
                    .split(/[\n,;]+/)
                    .map(v => v.trim())
                    .filter(v => v.length > 0);
                const stockModeImei = !!formData.get('stockModeImei');
                const hasImei = stockModeImei && imeis.length > 0;
                
                const productIndex = this.demoData.products.findIndex(p => p.id === productId);
                if (productIndex === -1) {
                    this.showNotification('Không tìm thấy sản phẩm', 'error');
                    return;
                }
                
                // Cập nhật thông tin sản phẩm (IMEI → minStock = 0, mỗi máy 1 IMEI không cần cảnh báo)
                this.demoData.products[productIndex] = {
                    ...this.demoData.products[productIndex],
                    name: formData.get('name'),
                    category: formData.get('category'),
                    importPrice: this.parsePrice(formData.get('importPrice')),
                    price: this.parsePrice(formData.get('price')),
                    stock: hasImei ? imeis.length : parseInt(formData.get('stock') || '0'),
                    minStock: hasImei ? 0 : (() => { const m = parseInt(formData.get('minStock'), 10); return isNaN(m) ? 10 : Math.max(0, m); })(),
                    supplier: formData.get('supplier'),
                    hasImei,
                    imeis: hasImei ? imeis : []
                };
                
                this.saveToLocalStorage();
                this.showNotification(`Đã cập nhật sản phẩm ${formData.get('name')}`, 'success');
                this.loadPage('products');
                const modal = form.closest("div[style*=\"fixed\"]"); if(modal) modal.remove();
            }

            _isCategoryRoot(c) { return c.parent === null || c.parent === undefined || c.parent === ''; }
            _getCategoryById(id) { return (this.demoData.categories || []).find(c => c.id === id); }

            getCategoryOptionsWithSelected(selectedCategory) {
                const categories = (this.demoData.categories || []).length ? this.demoData.categories : [];
                const selected = (selectedCategory || '').trim();
                let options = '<option value="">Chọn danh mục</option>';
                const allNames = categories.map(c => (c.name || '').trim()).filter(Boolean);
                const nameCount = {};
                allNames.forEach(n => { nameCount[n] = (nameCount[n] || 0) + 1; });
                const rootNames = new Set(categories.filter(c => this._isCategoryRoot(c)).map(c => c.name));
                const allCategoryNames = new Set(categories.map(c => c.name));
                categories.forEach(c => categories.filter(s => s.parent === c.id).forEach(s => allCategoryNames.add(s.name)));
                const hasInList = selected && allCategoryNames.has(selected);
                if (selected && !hasInList) {
                    options += `<option value="${selected.replace(/"/g, '&quot;')}" selected>${selected.replace(/</g, '&lt;')}</option>`;
                }
                const parentOccurrence = {};
                categories.forEach(category => {
                    const isRoot = this._isCategoryRoot(category);
                    const isOrphan = !isRoot && !this._getCategoryById(category.parent);
                    if (!isRoot && !isOrphan) return;
                    const pName = category.name || '';
                    parentOccurrence[pName] = (parentOccurrence[pName] || 0) + 1;
                    const pCount = nameCount[pName] || 0;
                    const parentLabel = pCount > 1 && parentOccurrence[pName] > 1 ? `${pName} (${parentOccurrence[pName]})` : pName;
                    const sel = category.name === selected ? 'selected' : '';
                    options += `<option value="${pName.replace(/"/g, '&quot;')}" ${sel}>${parentLabel.replace(/</g, '&lt;')}</option>`;
                    const subCategories = categories.filter(c => c.parent === category.id);
                    subCategories.forEach(subCat => {
                        const fullVal = `${category.name} > ${subCat.name}`;
                        const label = (nameCount[subCat.name] || 0) > 1 ? `${category.name} › ${subCat.name}` : `-- ${subCat.name}`;
                        const childMatchesOnly = subCat.name === selected && !rootNames.has(selected);
                        const subSel = (fullVal === selected || childMatchesOnly) ? 'selected' : '';
                        options += `<option value="${fullVal.replace(/"/g, '&quot;')}" ${subSel}>${label.replace(/</g, '&lt;')}</option>`;
                    });
                });
                return options;
            }
